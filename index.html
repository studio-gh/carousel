<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Carousel Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Work+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=Poppins:wght@400;500;600;700;800;900&family=DM+Sans:wght@400;500;600;700;800;900&family=Manrope:wght@400;500;600;700;800&family=Archivo:wght@400;500;600;700;800;900&family=Nunito+Sans:wght@400;500;600;700;800;900&family=Playfair+Display:wght@400;500;600;700;800;900&family=Fraunces:wght@400;500;600;700;800;900&family=Libre+Baskerville:wght@400;700&family=Source+Serif+4:wght@400;500;600;700;800;900&family=Lora:wght@400;500;600;700&family=Cormorant:wght@400;500;600;700&family=Archivo+Black&family=Bebas+Neue&family=Anton&family=Bricolage+Grotesque:wght@400;500;600;700;800&family=Unbounded:wght@400;500;600;700;800;900&family=Big+Shoulders:wght@400;500;600;700;800;900&family=Space+Mono:wght@400;700&family=JetBrains+Mono:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&family=Caveat:wght@400;500;600;700&family=Pacifico&family=Dancing+Script:wght@400;500;600;700&family=Kalam:wght@300;400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  :root{
    --bg:#2C2C2C; --surface:#363636; --surface-hover:#404040;
    --ink:#FFFCF4; --muted:rgba(255,252,244,.55); --line:rgba(255,252,244,.16); --line-strong:rgba(255,252,244,.3);
    --panel:#2C2C2C; --app-bg:#2C2C2C;
    --accent-ui:#FFAD2A; --accent-ui-soft:rgba(255,173,42,.16); --danger:#FF6B5B;
    --accent-ui-ink:#2C2C2C;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0; background:var(--app-bg); color:var(--ink);
    font-family:"Inter",-apple-system,sans-serif;
    display:flex; flex-direction:column; height:100vh; overflow:hidden;
  }
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 20px; background:var(--panel); border-bottom:1px solid var(--line);
    flex-shrink:0;
  }
  .brand{display:flex; align-items:center; gap:10px; font-family:"Space Grotesk",sans-serif; font-weight:700; font-size:17px;}
  .brand .dot{width:9px; height:9px; border-radius:50%; background:var(--accent-ui); flex-shrink:0;}
  .topbar-actions{display:flex; align-items:center; gap:10px;}
  .btn{
    font-family:"Inter",sans-serif; font-size:13px; font-weight:600; border-radius:8px;
    border:1px solid var(--line); background:var(--panel); color:var(--ink);
    padding:8px 14px; cursor:pointer; display:inline-flex; align-items:center; gap:6px;
    transition:background .1s ease, border-color .1s ease;
  }
  .btn:hover{background:var(--surface-hover); border-color:var(--line-strong);}
  .btn.primary{background:var(--accent-ui); border-color:var(--accent-ui); color:var(--accent-ui-ink);}
  .btn.primary:hover{background:#E69A1E;}
  .btn:disabled{opacity:.4; cursor:not-allowed;}
  .btn.small{padding:5px 9px; font-size:12px; border-radius:6px;}
  .btn.full{width:100%; justify-content:center;}
  .dropdown{position:relative; display:inline-block;}
  .dropdown-menu{
    position:absolute; top:calc(100% + 6px); right:0; background:var(--panel);
    border:1px solid var(--line); border-radius:10px; box-shadow:0 8px 24px rgba(20,22,26,.12);
    padding:6px; min-width:190px; display:none; z-index:50;
  }
  .dropdown.open .dropdown-menu{display:block;}
  .dropdown-menu button{
    width:100%; text-align:left; background:none; border:none; padding:9px 10px;
    font-size:13px; font-family:"Inter",sans-serif; border-radius:6px; cursor:pointer; color:var(--ink);
  }
  .dropdown-menu button:hover{background:var(--accent-ui-soft); color:var(--accent-ui);}
  .dropdown-menu .hint{font-size:11px; color:var(--muted); padding:6px 10px 2px;}

  .workspace{flex:1; display:flex; min-height:0;}
  .sidebar{
    width:288px; flex-shrink:0; background:var(--panel); border-right:1px solid var(--line);
    overflow-y:auto; padding:18px 16px 40px;
  }
  .stage-wrap{flex:1; display:flex; flex-direction:column; min-width:0;}
  .stage{
    flex:1; display:flex; align-items:center; justify-content:center; padding:30px; min-height:0;
    overflow:auto;
  }
  .section-label{
    font-size:11px; font-weight:700; letter-spacing:.06em; text-transform:uppercase;
    color:var(--muted); margin:22px 0 10px;
  }
  .section-label:first-child{margin-top:0;}
  .field{margin-bottom:12px;}
  .field label{display:block; font-size:12.5px; font-weight:600; color:var(--ink); margin-bottom:6px;}
  select, .stepper input{
    width:100%; font-family:"Inter",sans-serif; font-size:13px; padding:8px 10px;
    border:1px solid var(--line); border-radius:8px; background:var(--surface); color:var(--ink);
  }
  .row2{display:grid; grid-template-columns:1fr 1fr; gap:8px;}
  .stepper{display:flex; align-items:center; gap:8px;}
  .stepper button{
    width:30px; height:30px; border-radius:8px; border:1px solid var(--line); background:var(--surface); color:var(--ink);
    font-size:15px; cursor:pointer; flex-shrink:0;
  }
  .stepper button:hover{background:var(--surface-hover);}
  .stepper span{font-size:13px; font-weight:600; min-width:20px; text-align:center;}
  .segmented{display:flex; border:1px solid var(--line); border-radius:8px; overflow:hidden;}
  .segmented button{
    flex:1; padding:7px 4px; font-size:12px; font-weight:600; background:var(--surface); border:none;
    cursor:pointer; color:var(--muted); border-right:1px solid var(--line);
  }
  .segmented button:last-child{border-right:none;}
  .segmented button.active{background:var(--accent-ui); color:var(--accent-ui-ink);}
  .colorfield{display:flex; align-items:center; gap:8px; border:1px solid var(--line); border-radius:8px; padding:5px 8px;}
  .colorfield input[type=color]{width:26px; height:26px; border:none; padding:0; background:none; cursor:pointer;}
  .colorfield span{font-size:12px; color:var(--muted); font-family:monospace;}
  input[type=range]{width:100%; accent-color:var(--accent-ui);}
  .rangeval{font-size:11px; color:var(--muted); float:right; font-weight:600;}
  .imgctrl{display:flex; gap:8px;}
  .imgctrl .btn{flex:1; justify-content:center;}
  .toggle-row{display:flex; align-items:center; justify-content:space-between;}
  .switch{position:relative; width:36px; height:20px; flex-shrink:0;}
  .switch input{opacity:0; width:0; height:0;}
  .slider-tg{position:absolute; inset:0; background:var(--surface-hover); border-radius:20px; cursor:pointer; transition:.15s;}
  .slider-tg:before{content:""; position:absolute; width:16px; height:16px; left:2px; top:2px; background:#fff; border-radius:50%; transition:.15s;}
  input:checked + .slider-tg{background:var(--accent-ui);}
  input:checked + .slider-tg:before{transform:translateX(16px);}
  .empty-hint{font-size:11.5px; color:var(--muted); line-height:1.5; background:var(--surface); border-radius:8px; padding:9px 11px; margin-top:4px;}
  .layout-grid{display:grid; grid-template-columns:1fr 1fr; gap:6px;}
  .layout-opt{
    border:1.5px solid var(--line); border-radius:8px; padding:6px; cursor:pointer; background:var(--surface);
    display:flex; flex-direction:column; align-items:center; gap:4px;
  }
  .layout-opt svg{width:100%; height:34px;}
  .layout-opt span{font-size:10.5px; color:var(--muted); font-weight:600; text-align:center;}
  .layout-opt.active{border-color:var(--accent-ui); background:var(--accent-ui-soft);}
  .layout-opt.active span{color:var(--accent-ui);}
  .layout-opt.full-span{grid-column:1/3;}
  .overlay-grid{display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px;}
  .overlay-opt{
    border:1.5px solid var(--line); border-radius:8px; padding:6px 2px; cursor:pointer; background:var(--surface);
    font-size:11px; font-weight:600; color:var(--muted); text-align:center;
  }
  .overlay-opt.active{border-color:var(--accent-ui); background:var(--accent-ui-soft); color:var(--accent-ui);}

  /* ---------- Slide canvas ---------- */
  .slide{ position:relative; overflow:hidden; background:#fff; box-shadow:0 20px 50px rgba(20,22,26,.18); border-radius:3px; flex-shrink:0; }
  .thumb-frame .slide{box-shadow:none; border-radius:0;}
  .frame-image{position:absolute; overflow:hidden;}
  .frame-image img{position:absolute; max-width:none; -webkit-user-drag:none; user-select:none;}
  .frame-image.editable img{cursor:grab; touch-action:none;}
  .frame-image.editable img.dragging{cursor:grabbing;}
  .text-drag-handle{
    position:absolute; top:-14px; left:-14px; width:28px; height:28px; border-radius:50%;
    background:var(--accent-ui); color:#1A1A1A; display:flex; align-items:center; justify-content:center;
    font-size:14px; cursor:grab; touch-action:none; box-shadow:0 2px 6px rgba(0,0,0,.4); z-index:5;
  }
  .text-drag-handle.dragging{cursor:grabbing;}
  .slide-overlay{position:absolute; pointer-events:none;}
  .slide-overlay.dir-bottom{background:linear-gradient(to bottom, rgba(0,0,0,0) 25%, rgba(0,0,0,var(--ov)) 100%);}
  .slide-overlay.dir-top{background:linear-gradient(to top, rgba(0,0,0,0) 25%, rgba(0,0,0,var(--ov)) 100%);}
  .slide-overlay.dir-left{background:linear-gradient(to left, rgba(0,0,0,0) 25%, rgba(0,0,0,var(--ov)) 100%);}
  .slide-overlay.dir-right{background:linear-gradient(to right, rgba(0,0,0,0) 25%, rgba(0,0,0,var(--ov)) 100%);}
  .slide-overlay.dir-radial{background:radial-gradient(circle, rgba(0,0,0,0) 35%, rgba(0,0,0,var(--ov)) 100%);}
  .slide-overlay.dir-flat{background:rgba(0,0,0,var(--ov));}
  .frame-text{position:absolute; display:flex; flex-direction:column; overflow:visible;}
  .frame-text.pos-top{justify-content:flex-start;}
  .frame-text.pos-center{justify-content:center;}
  .frame-text.pos-bottom{justify-content:flex-end;}
  .frame-text.align-left{align-items:flex-start; text-align:left;}
  .frame-text.align-center{align-items:center; text-align:center;}
  .slide-heading{margin:0; outline:none; white-space:pre-wrap; word-wrap:break-word; width:100%;}
  .slide-body{margin:0; outline:none; white-space:pre-wrap; word-wrap:break-word; width:100%;}
  .slide-badge{position:absolute; border-radius:999px; display:flex; align-items:center; justify-content:center; white-space:nowrap;}

  .rail{
    display:flex; align-items:flex-end; gap:12px; padding:14px 20px; background:var(--panel);
    border-top:1px solid var(--line); overflow-x:auto; flex-shrink:0;
  }
  .thumb-wrap{position:relative; flex-shrink:0; cursor:pointer;}
  .thumb-frame{
    width:74px; overflow:hidden; border-radius:6px; border:2px solid transparent; position:relative;
    box-shadow:0 2px 8px rgba(0,0,0,.35); background:var(--surface);
  }
  .thumb-wrap.active .thumb-frame{border-color:var(--accent-ui);}
  .thumb-inner{transform-origin:top left; pointer-events:none;}
  .thumb-num{font-size:11px; color:var(--muted); text-align:center; margin-top:5px; font-weight:600;}
  .thumb-actions{ position:absolute; top:3px; right:3px; display:flex; gap:3px; opacity:0; transition:.12s; }
  .thumb-wrap:hover .thumb-actions{opacity:1;}
  .thumb-actions button{
    width:18px; height:18px; border-radius:4px; border:none; background:rgba(20,22,26,.65);
    color:#fff; font-size:11px; line-height:1; cursor:pointer; display:flex; align-items:center; justify-content:center;
  }
  .thumb-actions button:hover{background:rgba(20,22,26,.9);}
  .add-slide-btn{
    flex-shrink:0; width:74px; height:92px; border-radius:6px; border:2px dashed var(--line-strong);
    background:none; color:var(--muted); font-size:22px; cursor:pointer; display:flex; align-items:center; justify-content:center;
  }
  .add-slide-btn:hover{border-color:var(--accent-ui); color:var(--accent-ui);}
  .btn-short{display:none;}
  .mobile-menu-btn{
    display:none; align-items:center; justify-content:center; width:34px; height:34px;
    border-radius:8px; border:1px solid var(--line); background:none; color:var(--ink);
    font-size:16px; cursor:pointer; margin-right:10px; flex-shrink:0;
  }
  .sidebar-backdrop{display:none;}
  .sidebar-close-btn{display:none;}

  @media (max-width: 820px){
    .mobile-menu-btn{ display:flex; }
    .brand{ font-size:15px; }
    .topbar{ padding:9px 12px; }
    .btn{ padding:8px 10px; font-size:12.5px; }
    .btn-full{display:none;}
    .btn-short{display:inline;}
    .sidebar{
      position:fixed; top:0; left:0; height:100%; width:84%; max-width:340px;
      transform:translateX(-100%); transition:transform .22s ease; z-index:210;
      box-shadow:0 0 40px rgba(0,0,0,.5); padding-top:56px;
    }
    .sidebar.open{ transform:translateX(0); }
    .sidebar-backdrop.open{
      display:block; position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:200;
    }
    .sidebar-close-btn.open{
      display:flex; position:fixed; top:12px; left:calc(min(84vw, 340px) - 44px); z-index:220; border-radius:8px; border:1px solid var(--line);
      background:var(--panel); color:var(--ink); font-size:16px; align-items:center; justify-content:center; cursor:pointer;
    }
    .stage{ padding:16px; }
    .rail{ padding:10px 14px; gap:9px; }
    .segmented button{ padding:10px 4px; }
    .layout-opt, .overlay-opt{ padding:9px 6px; }
    .thumb-actions button{ width:22px; height:22px; font-size:13px; }
  }
  .credit{
    position:fixed; right:16px; bottom:10px; z-index:60;
    font-family:"Inter",sans-serif; font-weight:400; font-size:12px;
    color:rgba(255,252,244,.42); pointer-events:none; user-select:none; letter-spacing:.01em;
  }
</style>
</head>
<body>

<div class="topbar">
  <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Open editing panel">&#9776;</button>
  <div class="brand"><span class="dot"></span>Carousel Studio</div>
  <div class="topbar-actions">
    <div class="dropdown" id="pngDropdown">
      <button class="btn" onclick="toggleDropdown('pngDropdown')"><span class="btn-full">Export PNG</span><span class="btn-short">PNG</span> &#9662;</button>
      <div class="dropdown-menu">
        <div class="hint">Flat images</div>
        <button onclick="exportCurrentPNG()">This slide</button>
        <button onclick="exportAllPNG()">All slides (.zip)</button>
      </div>
    </div>
    <div class="dropdown" id="svgDropdown">
      <button class="btn" onclick="toggleDropdown('svgDropdown')"><span class="btn-full">Export SVG</span><span class="btn-short">SVG</span> &#9662;</button>
      <div class="dropdown-menu">
        <div class="hint">Layered, editable in Figma</div>
        <button onclick="exportCurrentSVG()">This slide</button>
        <button onclick="exportAllSVG()">All slides (.zip)</button>
      </div>
    </div>
  </div>
</div>

<div class="workspace">
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
  <button class="sidebar-close-btn" id="sidebarCloseBtn" aria-label="Close editing panel">&#10005;</button>
  <div class="sidebar" id="sidebar"></div>
  <div class="stage-wrap">
    <div class="stage" id="stage"></div>
    <div class="rail" id="rail"></div>
  </div>
</div>
<div class="credit">by Studio GH ⚡️</div>

<script>
/* ============================= DATA ============================= */
const FONTS = [
  { name:"Inter", category:"sans", weights:[400,500,600,700,800,900] },
  { name:"Work Sans", category:"sans", weights:[400,500,600,700,800] },
  { name:"Space Grotesk", category:"sans", weights:[400,500,600,700] },
  { name:"Poppins", category:"sans", weights:[400,500,600,700,800,900] },
  { name:"DM Sans", category:"sans", weights:[400,500,600,700,800,900] },
  { name:"Manrope", category:"sans", weights:[400,500,600,700,800] },
  { name:"Archivo", category:"sans", weights:[400,500,600,700,800,900] },
  { name:"Nunito Sans", category:"sans", weights:[400,500,600,700,800,900] },
  { name:"Playfair Display", category:"serif", weights:[400,500,600,700,800,900] },
  { name:"Fraunces", category:"serif", weights:[400,500,600,700,800,900] },
  { name:"Libre Baskerville", category:"serif", weights:[400,700] },
  { name:"Source Serif 4", category:"serif", weights:[400,500,600,700,800,900] },
  { name:"Lora", category:"serif", weights:[400,500,600,700] },
  { name:"Cormorant", category:"serif", weights:[400,500,600,700] },
  { name:"Archivo Black", category:"display", weights:[400] },
  { name:"Bebas Neue", category:"display", weights:[400] },
  { name:"Anton", category:"display", weights:[400] },
  { name:"Bricolage Grotesque", category:"display", weights:[400,500,600,700,800] },
  { name:"Unbounded", category:"display", weights:[400,500,600,700,800,900] },
  { name:"Big Shoulders", category:"display", weights:[400,500,600,700,800,900] },
  { name:"Space Mono", category:"mono", weights:[400,700] },
  { name:"JetBrains Mono", category:"mono", weights:[400,500,600,700,800] },
  { name:"IBM Plex Mono", category:"mono", weights:[400,500,600,700] },
  { name:"Caveat", category:"handwriting", weights:[400,500,600,700] },
  { name:"Pacifico", category:"handwriting", weights:[400] },
  { name:"Dancing Script", category:"handwriting", weights:[400,500,600,700] },
  { name:"Kalam", category:"handwriting", weights:[300,400,700] },
];
const FONT_CATEGORIES = { all:"All styles", sans:"Sans-serif", serif:"Serif", display:"Display", mono:"Monospace", handwriting:"Handwriting" };
const FALLBACK_BY_CATEGORY = { sans:"sans-serif", serif:"serif", display:"sans-serif", mono:"monospace", handwriting:"cursive" };
function findFont(name){ return FONTS.find(f=>f.name===name) || FONTS[0]; }
function fontsInCategory(cat){ return cat==="all" ? FONTS : FONTS.filter(f=>f.category===cat); }
function fontFamilyCSS(name){ const f = findFont(name); return `"${f.name}",${FALLBACK_BY_CATEGORY[f.category]||"sans-serif"}`; }
function nearestWeight(font, weight){ return font.weights.reduce((best,w)=> Math.abs(w-weight)<Math.abs(best-weight) ? w : best, font.weights[0]); }

const ASPECTS = {
  portrait: { label:"Portrait 4:5", w:1080, h:1350 },
  square:   { label:"Square 1:1",   w:1080, h:1080 },
  story:    { label:"Story 9:16",   w:1080, h:1920 },
};
const SIZE_MULT = { S:0.85, M:1, L:1.15 };
const LAYOUTS = {
  full:   { label:"Full bleed" },
  left:   { label:"Image left" },
  right:  { label:"Image right" },
  top:    { label:"Image top" },
  bottom: { label:"Image bottom" },
};
const OVERLAY_DIRS = {
  none:   "None",
  bottom: "Bottom",
  top:    "Top",
  left:   "Left",
  right:  "Right",
  radial: "Radial",
  flat:   "Flat",
};

function blankSlideDefaults(){
  return {
    image:null, imageEl:null, layout:"full",
    imageScale:1, imageOffsetX:0.5, imageOffsetY:0.5,
    overlayDirection:"bottom", overlayOpacity:55,
    textOffsetX:0, textOffsetY:0,
    tscale:1
  };
}
function defaultSlides(){
  const b = blankSlideDefaults;
  return [
    { ...b(), heading:"5 morning habits\nthat quietly fixed\nmy focus", body:"Swipe through \u2014 #3 took me 2 minutes to build.", bgColor:"#EFE9E1", textColor:"#14161A", position:"center", align:"left" },
    { ...b(), heading:"01 \u2014 Light before phone", body:"Open the curtains before you open Instagram. Ten seconds, huge difference.", bgColor:"#DDE7E3", textColor:"#14161A", position:"bottom", align:"left" },
    { ...b(), heading:"02 \u2014 One glass of water", body:"Before coffee. You've been asleep for 7+ hours \u2014 rehydrate first.", bgColor:"#E7DEDD", textColor:"#14161A", position:"bottom", align:"left" },
    { ...b(), heading:"03 \u2014 Write 3 priorities", body:"Not a to-do list. Just the three things that matter today.", bgColor:"#DEE1E9", textColor:"#14161A", position:"bottom", align:"left" },
    { ...b(), heading:"Save this for\ntomorrow morning", body:"Follow for more habits that actually stick.", bgColor:"#14161A", textColor:"#FAFAF9", position:"center", align:"center" },
  ];
}

const state = {
  aspect: "portrait",
  headFont: "Playfair Display", headWeight: 900, headCategory: "all",
  bodyFont: "Inter", bodyWeight: 400, bodyCategory: "all",
  accent: "#FFAD2A", badgeTextColor: "#1A1A1A", size: "M",
  showPageNum: true, badgePos: "bottom",
  slides: defaultSlides(), active: 0,
};

let railThumbEls = [];
let thumbDebounceTimer = null;
let stageRefs = {};
let textStageRef = {};

/* ============================= HELPERS ============================= */
function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }
function escapeXML(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&apos;"); }
function saveBlob(blob, filename){
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 2000);
}
function toggleDropdown(id){
  document.querySelectorAll(".dropdown").forEach(d=>{ if(d.id!==id) d.classList.remove("open"); });
  document.getElementById(id).classList.toggle("open");
}
document.addEventListener("click", (e)=>{
  if(!e.target.closest(".dropdown")) document.querySelectorAll(".dropdown").forEach(d=>d.classList.remove("open"));
});
function wrapLines(ctx, text, maxWidth){
  const paras = text.split("\n");
  let lines = [];
  paras.forEach(p=>{
    if(p===""){ lines.push(""); return; }
    const words = p.split(" ");
    let line = "";
    words.forEach(w=>{
      const test = line ? line+" "+w : w;
      if(ctx.measureText(test).width > maxWidth && line){ lines.push(line); line = w; }
      else line = test;
    });
    lines.push(line);
  });
  return lines;
}
function loadImageEl(dataURL){
  return new Promise(res=>{ const img = new Image(); img.onload = ()=>res(img); img.src = dataURL; });
}
function getBoxes(layout, W, H){
  switch(layout){
    case "left":   return { image:{x:0,y:0,w:W/2,h:H}, text:{x:W/2,y:0,w:W/2,h:H} };
    case "right":  return { image:{x:W/2,y:0,w:W/2,h:H}, text:{x:0,y:0,w:W/2,h:H} };
    case "top":    return { image:{x:0,y:0,w:W,h:H/2}, text:{x:0,y:H/2,w:W,h:H/2} };
    case "bottom": return { image:{x:0,y:H/2,w:W,h:H/2}, text:{x:0,y:0,w:W,h:H/2} };
    default:       return { image:{x:0,y:0,w:W,h:H}, text:{x:0,y:0,w:W,h:H} };
  }
}
function computeImageBox(natW, natH, boxW, boxH, scale, offX, offY){
  const coverScale = Math.max(boxW/natW, boxH/natH);
  const finalScale = coverScale * Math.max(1, scale||1);
  const dw = natW*finalScale, dh = natH*finalScale;
  const excessX = Math.max(0, dw-boxW), excessY = Math.max(0, dh-boxH);
  const left = -excessX*(offX??0.5), top = -excessY*(offY??0.5);
  return { dw, dh, left, top, excessX, excessY };
}
function basePad(W){ return W*0.08; }
function textSizes(W, s){
  const t = SIZE_MULT[state.size] * (s.tscale||1);
  return { headPx:W*0.086*t, bodyPx:W*0.036*t, headLH:W*0.086*t*1.08, bodyLH:W*0.036*t*1.35, gap:W*0.03 };
}

function layoutIcon(kind){
  const box=(l)=>`<svg viewBox="0 0 100 60" preserveAspectRatio="none">${l}</svg>`;
  const IMG='rgba(255,252,244,.22)', LINE='#FFAD2A';
  if(kind==="full") return box(`<rect width="100" height="60" fill="${IMG}"/><rect x="8" y="34" width="60" height="6" fill="${LINE}"/><rect x="8" y="44" width="40" height="5" fill="${LINE}" opacity=".55"/>`);
  if(kind==="left") return box(`<rect width="50" height="60" fill="${IMG}"/><rect x="58" y="24" width="34" height="6" fill="${LINE}"/><rect x="58" y="34" width="24" height="5" fill="${LINE}" opacity=".55"/>`);
  if(kind==="right") return box(`<rect x="50" width="50" height="60" fill="${IMG}"/><rect x="8" y="24" width="34" height="6" fill="${LINE}"/><rect x="8" y="34" width="24" height="5" fill="${LINE}" opacity=".55"/>`);
  if(kind==="top") return box(`<rect width="100" height="30" fill="${IMG}"/><rect x="8" y="40" width="50" height="6" fill="${LINE}"/>`);
  if(kind==="bottom") return box(`<rect y="30" width="100" height="30" fill="${IMG}"/><rect x="8" y="12" width="50" height="6" fill="${LINE}"/>`);
}

function cloneSlide(s){
  const c = JSON.parse(JSON.stringify(s, (k,v)=> k==="imageEl" ? undefined : v));

}

/* ============================= SLIDE DOM BUILD ============================= */
function buildSlideDOM(s, idx, editable, W){
  const asp = ASPECTS[state.aspect];
  const H = W * asp.h/asp.w;
  const fp = {
    headFont: fontFamilyCSS(state.headFont), headWeight: state.headWeight, headName: state.headFont,
    bodyFont: fontFamilyCSS(state.bodyFont), bodyWeight: state.bodyWeight, bodyName: state.bodyFont,
  };
  const boxes = getBoxes(s.layout||"full", W, H);

  const div = document.createElement("div");
  div.className = "slide";
  div.style.width = W+"px"; div.style.height = H+"px";
  div.style.background = s.bgColor;

  if(s.image && s.imageEl){
    const frameImg = document.createElement("div");
    frameImg.className = "frame-image" + (editable ? " editable" : "");
    frameImg.style.left = boxes.image.x+"px"; frameImg.style.top = boxes.image.y+"px";
    frameImg.style.width = boxes.image.w+"px"; frameImg.style.height = boxes.image.h+"px";

    const img = document.createElement("img");
    img.src = s.image; img.draggable = false;
    const cb = computeImageBox(s.imageEl.naturalWidth, s.imageEl.naturalHeight, boxes.image.w, boxes.image.h, s.imageScale||1, s.imageOffsetX, s.imageOffsetY);
    img.style.left = cb.left+"px"; img.style.top = cb.top+"px";
    img.style.width = cb.dw+"px"; img.style.height = cb.dh+"px";
    frameImg.appendChild(img);
    div.appendChild(frameImg);

    if(editable){
      stageRefs = { imgEl:img, boxW:boxes.image.w, boxH:boxes.image.h, natW:s.imageEl.naturalWidth, natH:s.imageEl.naturalHeight, s };
      img.addEventListener("pointerdown", onImageDragStart);
    }

    if((s.layout||"full")==="full" && s.overlayDirection && s.overlayDirection!=="none"){
      const ov = document.createElement("div");
      ov.className = `slide-overlay dir-${s.overlayDirection}`;
      ov.style.left = boxes.image.x+"px"; ov.style.top = boxes.image.y+"px";
      ov.style.width = boxes.image.w+"px"; ov.style.height = boxes.image.h+"px";
      ov.style.setProperty("--ov", (s.overlayOpacity??55)/100);
      div.appendChild(ov);
    }
  }

  const pad = basePad(W);
  const ts = textSizes(W, s);
  const frameText = document.createElement("div");
  frameText.className = `frame-text pos-${s.position} align-${s.align}`;
  const toX = s.textOffsetX||0, toY = s.textOffsetY||0;
  frameText.style.left = (boxes.text.x+pad+toX)+"px"; frameText.style.top = (boxes.text.y+pad+toY)+"px";
  frameText.style.width = Math.max(10,boxes.text.w-2*pad)+"px"; frameText.style.height = Math.max(10,boxes.text.h-2*pad)+"px";
  frameText.style.gap = ts.gap+"px";

  if(editable){
    const handle = document.createElement("div");
    handle.className = "text-drag-handle";
    handle.innerHTML = "&#10021;";
    handle.addEventListener("pointerdown", onTextDragStart);
    frameText.appendChild(handle);
    textStageRef = { frameText, s, W, H };
  }

  const h = document.createElement("div");
  h.className = "slide-heading"; h.style.color = s.textColor;
  h.style.fontFamily = fp.headFont; h.style.fontWeight = fp.headWeight; h.style.fontSize = ts.headPx+"px"; h.style.lineHeight = "1.08";
  h.contentEditable = editable ? "true" : "false"; h.spellcheck = false; h.innerText = s.heading;
  if(editable){
    h.addEventListener("input", ()=>{ s.heading = h.innerText; fitText(div, frameText, s); scheduleThumbCommit(idx); });
    h.addEventListener("blur", ()=>{ s.heading = h.innerText; commitThumb(idx); });
  }
  frameText.appendChild(h);

  if((s.body && s.body.trim()!=="") || editable){
    const p = document.createElement("div");
    p.className = "slide-body"; p.style.color = s.textColor;
    p.style.fontFamily = fp.bodyFont; p.style.fontWeight = fp.bodyWeight; p.style.fontSize = ts.bodyPx+"px"; p.style.lineHeight = "1.35";
    p.contentEditable = editable ? "true" : "false"; p.spellcheck = false; p.innerText = s.body;
    if(editable){
      p.addEventListener("input", ()=>{ s.body = p.innerText; fitText(div, frameText, s); scheduleThumbCommit(idx); });
      p.addEventListener("blur", ()=>{ s.body = p.innerText; commitThumb(idx); });
    }
    frameText.appendChild(p);
  }
  div.appendChild(frameText);

  if(state.showPageNum){
    const badgePx = W*0.026;
    const badge = document.createElement("div");
    badge.className = "slide-badge";
    badge.style.background = state.accent;
    badge.style.color = state.badgeTextColor;
    badge.style.right = (W*0.05)+"px";
    badge.style[state.badgePos==="top"?"top":"bottom"] = (W*0.05)+"px";
    badge.style.padding = (W*0.011)+"px "+(W*0.022)+"px";
    badge.style.fontFamily = fp.bodyFont; badge.style.fontSize = badgePx+"px"; badge.style.fontWeight = "700";
    badge.textContent = `${idx+1}/${state.slides.length}`;
    div.appendChild(badge);
  }

  if(editable){
    requestAnimationFrame(()=>fitText(div, frameText, s));
  }
  return div;
}

function fitText(slideDiv, frameText, s){
  s.tscale = 1;
  let tries = 0;
  while(frameText.scrollHeight > frameText.clientHeight + 1 && s.tscale > 0.35 && tries < 60){
    s.tscale -= 0.02;
    const heading = frameText.querySelector(".slide-heading");
    const body = frameText.querySelector(".slide-body");
    const W = parseFloat(slideDiv.style.width);
    const ts = textSizes(W, s);
    if(heading) heading.style.fontSize = ts.headPx+"px";
    if(body) body.style.fontSize = ts.bodyPx+"px";
    frameText.style.gap = ts.gap+"px";
    tries++;
  }
}

/* ---------- image drag / zoom (live, no full re-render) ---------- */
let dragState = null;
function refreshImageLive(){
  const r = stageRefs;
  if(!r.imgEl) return;
  const cb = computeImageBox(r.natW, r.natH, r.boxW, r.boxH, r.s.imageScale||1, r.s.imageOffsetX, r.s.imageOffsetY);
  r.imgEl.style.left = cb.left+"px"; r.imgEl.style.top = cb.top+"px";
  r.imgEl.style.width = cb.dw+"px"; r.imgEl.style.height = cb.dh+"px";
}
function onImageDragStart(e){
  e.preventDefault();
  const r = stageRefs;
  const cb = computeImageBox(r.natW, r.natH, r.boxW, r.boxH, r.s.imageScale||1, r.s.imageOffsetX, r.s.imageOffsetY);
  dragState = { startX:e.clientX, startY:e.clientY, startOffX:r.s.imageOffsetX??0.5, startOffY:r.s.imageOffsetY??0.5, excessX:cb.excessX, excessY:cb.excessY };
  e.target.classList.add("dragging");
  try{ e.target.setPointerCapture(e.pointerId); }catch(err){}
  document.addEventListener("pointermove", onImageDragMove);
  document.addEventListener("pointerup", onImageDragEnd);
  document.addEventListener("pointercancel", onImageDragEnd);
}
function onImageDragMove(e){
  if(!dragState) return;
  e.preventDefault();
  const r = stageRefs;
  const dx = e.clientX - dragState.startX, dy = e.clientY - dragState.startY;
  r.s.imageOffsetX = dragState.excessX>0 ? clamp(dragState.startOffX - dx/dragState.excessX, 0, 1) : 0.5;
  r.s.imageOffsetY = dragState.excessY>0 ? clamp(dragState.startOffY - dy/dragState.excessY, 0, 1) : 0.5;
  refreshImageLive();
}
function onImageDragEnd(){
  if(!dragState) return;
  document.removeEventListener("pointermove", onImageDragMove);
  document.removeEventListener("pointerup", onImageDragEnd);
  document.removeEventListener("pointercancel", onImageDragEnd);
  if(stageRefs.imgEl) stageRefs.imgEl.classList.remove("dragging");
  dragState = null;
  commitThumb(state.active);
}

let textDragState = null;
function onTextDragStart(e){
  e.preventDefault(); e.stopPropagation();
  const r = textStageRef;
  textDragState = { startX:e.clientX, startY:e.clientY, baseOffX:r.s.textOffsetX||0, baseOffY:r.s.textOffsetY||0, dx:0, dy:0 };
  e.target.classList.add("dragging");
  try{ e.target.setPointerCapture(e.pointerId); }catch(err){}
  document.addEventListener("pointermove", onTextDragMove);
  document.addEventListener("pointerup", onTextDragEnd);
  document.addEventListener("pointercancel", onTextDragEnd);
}
function onTextDragMove(e){
  if(!textDragState) return;
  e.preventDefault();
  const dx = e.clientX - textDragState.startX, dy = e.clientY - textDragState.startY;
  textDragState.dx = dx; textDragState.dy = dy;
  if(textStageRef.frameText) textStageRef.frameText.style.transform = `translate(${dx}px, ${dy}px)`;
}
function onTextDragEnd(){
  if(!textDragState) return;
  document.removeEventListener("pointermove", onTextDragMove);
  document.removeEventListener("pointerup", onTextDragEnd);
  document.removeEventListener("pointercancel", onTextDragEnd);
  const r = textStageRef;
  if(r.s){
    r.s.textOffsetX = clamp(textDragState.baseOffX + textDragState.dx, -r.W*0.45, r.W*0.45);
    r.s.textOffsetY = clamp(textDragState.baseOffY + textDragState.dy, -r.H*0.45, r.H*0.45);
  }
  document.querySelectorAll(".text-drag-handle.dragging").forEach(h=>h.classList.remove("dragging"));
  textDragState = null;
  renderStage();
  commitThumb(state.active);
}

/* ============================= STAGE / RAIL RENDER ============================= */
function renderStage(){
  const stage = document.getElementById("stage");
  stage.innerHTML = "";
  const asp = ASPECTS[state.aspect];
  const maxW = Math.min(stage.clientWidth-40, 460);
  const maxHRatio = (stage.clientHeight-40) / (asp.h/asp.w);
  const widthPx = Math.max(160, Math.min(maxW, maxHRatio));
  const slideDiv = buildSlideDOM(state.slides[state.active], state.active, true, widthPx);
  stage.appendChild(slideDiv);
}

function buildThumb(idx){
  const s = state.slides[idx];
  const wrap = document.createElement("div");
  wrap.className = "thumb-wrap" + (idx===state.active?" active":"");
  const frame = document.createElement("div");
  frame.className = "thumb-frame";
  const inner = document.createElement("div");
  inner.className = "thumb-inner";
  const asp = ASPECTS[state.aspect];
  const thumbW = 74, realW = 220;
  const scale = thumbW/realW;
  inner.style.transform = `scale(${scale})`;
  const mini = buildSlideDOM(s, idx, false, realW);
  inner.appendChild(mini);
  frame.style.height = (thumbW*(asp.h/asp.w))+"px";
  frame.appendChild(inner);
  wrap.appendChild(frame);
  const num = document.createElement("div");
  num.className = "thumb-num"; num.textContent = idx+1;
  wrap.appendChild(num);
  const actions = document.createElement("div");
  actions.className = "thumb-actions";
  actions.innerHTML = `<button title="Duplicate">\u2295</button><button title="Delete">\u2715</button>`;
  actions.children[0].onclick = (e)=>{ e.stopPropagation(); const clone=cloneSlide(state.slides[idx]); state.slides.splice(idx+1,0,clone); state.active=idx+1; renderAll(); };
  actions.children[1].onclick = (e)=>{ e.stopPropagation(); if(state.slides.length>1){ state.slides.splice(idx,1); state.active=Math.max(0,Math.min(state.active,state.slides.length-1)); renderAll(); } };
  wrap.appendChild(actions);
  wrap.onclick = ()=>setActiveSlide(idx);
  return wrap;
}

function renderRail(){
  const rail = document.getElementById("rail");
  rail.innerHTML = ""; railThumbEls = [];
  state.slides.forEach((s,i)=>{ const w = buildThumb(i); railThumbEls.push(w); rail.appendChild(w); });
  const addBtn = document.createElement("button");
  addBtn.className = "add-slide-btn"; addBtn.textContent = "+";
  addBtn.onclick = ()=>{ if(state.slides.length<12){ const d=defaultSlides(); const t=d[state.slides.length % d.length]; state.slides.push({...t, imageEl:null}); state.active=state.slides.length-1; renderAll(); } };
  rail.appendChild(addBtn);
}

function commitThumb(idx){
  if(!railThumbEls[idx]) return;
  const fresh = buildThumb(idx);
  railThumbEls[idx].replaceWith(fresh);
  railThumbEls[idx] = fresh;
}
function scheduleThumbCommit(idx){
  clearTimeout(thumbDebounceTimer);
  thumbDebounceTimer = setTimeout(()=>commitThumb(idx), 350);
}
function updateRailActiveClasses(){
  railThumbEls.forEach((w,i)=>w.classList.toggle("active", i===state.active));
}
function setActiveSlide(idx){
  state.active = idx;
  renderSidebar();
  renderStage();
  updateRailActiveClasses();
}

function renderAll(){
  renderSidebar();
  renderStage();
  renderRail();
}
window.addEventListener("resize", ()=>{ renderStage(); });

/* ============================= EXPORT: CANVAS (PNG) ============================= */
async function ensureFontsReady(){
  const fp = {
    headFont: fontFamilyCSS(state.headFont), headWeight: state.headWeight, headName: state.headFont,
    bodyFont: fontFamilyCSS(state.bodyFont), bodyWeight: state.bodyWeight, bodyName: state.bodyFont,
  };
  try{
    await Promise.all([
      document.fonts.load(`${fp.headWeight} 80px "${fp.headName}"`),
      document.fonts.load(`${fp.bodyWeight} 40px "${fp.bodyName}"`),
    ]);
    await document.fonts.ready;
  }catch(e){}
}

function drawImageInBox(ctx, img, box, s){
  ctx.save();
  ctx.beginPath(); ctx.rect(box.x, box.y, box.w, box.h); ctx.clip();
  const cb = computeImageBox(img.naturalWidth, img.naturalHeight, box.w, box.h, s.imageScale||1, s.imageOffsetX, s.imageOffsetY);
  ctx.drawImage(img, box.x+cb.left, box.y+cb.top, cb.dw, cb.dh);
  ctx.restore();
}

function paintOverlayCanvas(ctx, box, dir, opacity){
  if(!dir || dir==="none") return;
  const {x,y,w,h} = box;
  let grad;
  if(dir==="bottom"){ grad = ctx.createLinearGradient(x,y+h*0.25,x,y+h); grad.addColorStop(0,"rgba(0,0,0,0)"); grad.addColorStop(1,`rgba(0,0,0,${opacity})`); }
  else if(dir==="top"){ grad = ctx.createLinearGradient(x,y+h,x,y+h*0.25); grad.addColorStop(0,"rgba(0,0,0,0)"); grad.addColorStop(1,`rgba(0,0,0,${opacity})`); }
  else if(dir==="left"){ grad = ctx.createLinearGradient(x+w,y,x+w*0.25,y); grad.addColorStop(0,"rgba(0,0,0,0)"); grad.addColorStop(1,`rgba(0,0,0,${opacity})`); }
  else if(dir==="right"){ grad = ctx.createLinearGradient(x,y,x+w*0.75,y); grad.addColorStop(0,"rgba(0,0,0,0)"); grad.addColorStop(1,`rgba(0,0,0,${opacity})`); }
  else if(dir==="radial"){ grad = ctx.createRadialGradient(x+w/2,y+h/2, Math.min(w,h)*0.05, x+w/2,y+h/2, Math.max(w,h)*0.62); grad.addColorStop(0,"rgba(0,0,0,0)"); grad.addColorStop(0.55,"rgba(0,0,0,0)"); grad.addColorStop(1,`rgba(0,0,0,${opacity})`); }
  else if(dir==="flat"){ ctx.fillStyle = `rgba(0,0,0,${opacity})`; ctx.fillRect(x,y,w,h); return; }
  if(grad){ ctx.fillStyle = grad; ctx.fillRect(x,y,w,h); }
}

async function renderSlideCanvas(s, idx){
  const asp = ASPECTS[state.aspect];
  const fp = {
    headFont: fontFamilyCSS(state.headFont), headWeight: state.headWeight, headName: state.headFont,
    bodyFont: fontFamilyCSS(state.bodyFont), bodyWeight: state.bodyWeight, bodyName: state.bodyFont,
  };
  const W = asp.w, H = asp.h;
  const boxes = getBoxes(s.layout||"full", W, H);
  const canvas = document.createElement("canvas");
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext("2d");

  ctx.fillStyle = s.bgColor; ctx.fillRect(0,0,W,H);

  if(s.image){
    let img = s.imageEl;
    if(!img || !img.complete) img = await loadImageEl(s.image);
    drawImageInBox(ctx, img, boxes.image, s);
    if((s.layout||"full")==="full"){
      paintOverlayCanvas(ctx, boxes.image, s.overlayDirection, (s.overlayOpacity??55)/100);
    }
  }

  const pad = basePad(W);
  const availW = boxes.text.w - 2*pad;
  const ts = textSizes(W, s);

  ctx.font = `${fp.headWeight} ${ts.headPx}px "${fp.headName}"`;
  const headLines = wrapLines(ctx, s.heading||"", availW);
  const hasBody = s.body && s.body.trim()!=="";
  ctx.font = `${fp.bodyWeight} ${ts.bodyPx}px "${fp.bodyName}"`;
  const bodyLines = hasBody ? wrapLines(ctx, s.body, availW) : [];

  const headBlockH = headLines.length*ts.headLH;
  const bodyBlockH = bodyLines.length*ts.bodyLH;
  const totalH = headBlockH + (hasBody? ts.gap+bodyBlockH : 0);

  let startY;
  const textTop = boxes.text.y + pad, textBottom = boxes.text.y + boxes.text.h - pad;
  if(s.position==="top") startY = textTop;
  else if(s.position==="bottom") startY = textBottom - totalH;
  else startY = textTop + ((textBottom-textTop)-totalH)/2;

  const toX = s.textOffsetX||0, toY = s.textOffsetY||0;
  startY += toY;
  const x = (s.align==="center" ? boxes.text.x + boxes.text.w/2 : boxes.text.x + pad) + toX;
  ctx.textAlign = s.align==="center" ? "center" : "left";
  ctx.textBaseline = "top";
  ctx.fillStyle = s.textColor;

  ctx.font = `${fp.headWeight} ${ts.headPx}px "${fp.headName}"`;
  headLines.forEach((line,i)=>{ ctx.fillText(line, x, startY + i*ts.headLH); });

  if(hasBody){
    ctx.font = `${fp.bodyWeight} ${ts.bodyPx}px "${fp.bodyName}"`;
    const bodyStartY = startY + headBlockH + ts.gap;
    bodyLines.forEach((line,i)=>{ ctx.fillText(line, x, bodyStartY + i*ts.bodyLH); });
  }

  if(state.showPageNum){
    const label = `${idx+1}/${state.slides.length}`;
    const badgePx = W*0.026;
    ctx.font = `700 ${badgePx}px "${fp.bodyName}"`;
    const textW = ctx.measureText(label).width;
    const padX = W*0.022, padY = W*0.011;
    const bw = textW + padX*2, bh = badgePx + padY*2;
    const bx = W - W*0.05 - bw;
    const by = state.badgePos==="top" ? W*0.05 : H - W*0.05 - bh;
    ctx.fillStyle = state.accent;
    roundRect(ctx, bx, by, bw, bh, bh/2); ctx.fill();
    ctx.fillStyle = state.badgeTextColor;
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(label, bx+bw/2, by+bh/2+1);
  }

  return canvas;
}
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath(); ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}

async function exportCurrentPNG(){
  await ensureFontsReady();
  const canvas = await renderSlideCanvas(state.slides[state.active], state.active);
  canvas.toBlob(blob=>saveBlob(blob, `slide-${state.active+1}.png`), "image/png");
}
async function exportAllPNG(){
  await ensureFontsReady();
  const zip = new JSZip();
  for(let i=0;i<state.slides.length;i++){
    const canvas = await renderSlideCanvas(state.slides[i], i);
    const blob = await new Promise(res=>canvas.toBlob(res,"image/png"));
    zip.file(`slide-${i+1}.png`, blob);
  }
  const content = await zip.generateAsync({type:"blob"});
  saveBlob(content, "carousel-png.zip");
}

/* ============================= EXPORT: SVG ============================= */
function overlaySVG(defs, body, box, dir, opacity, gid){
  if(!dir || dir==="none") return {defs, body};
  const {x,y,w,h} = box;
  if(dir==="flat"){ body += `<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="black" fill-opacity="${opacity.toFixed(3)}"/>`; return {defs, body}; }
  if(dir==="radial"){
    defs += `<radialGradient id="${gid}" cx="50%" cy="50%" r="62%"><stop offset="0" stop-color="black" stop-opacity="0"/><stop offset="55%" stop-color="black" stop-opacity="0"/><stop offset="100%" stop-color="black" stop-opacity="${opacity}"/></radialGradient>`;
    body += `<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="url(#${gid})"/>`;
    return {defs, body};
  }
  const coords = { bottom:["0","0","0","1"], top:["0","1","0","0"], left:["1","0","0","0"], right:["0","0","1","0"] }[dir];
  defs += `<linearGradient id="${gid}" x1="${coords[0]}" y1="${coords[1]}" x2="${coords[2]}" y2="${coords[3]}"><stop offset="25%" stop-color="black" stop-opacity="0"/><stop offset="100%" stop-color="black" stop-opacity="${opacity}"/></linearGradient>`;
  body += `<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="url(#${gid})"/>`;
  return {defs, body};
}

function buildSlideSVG(s, idx){
  const asp = ASPECTS[state.aspect];
  const fp = {
    headFont: fontFamilyCSS(state.headFont), headWeight: state.headWeight, headName: state.headFont,
    bodyFont: fontFamilyCSS(state.bodyFont), bodyWeight: state.bodyWeight, bodyName: state.bodyFont,
  };
  const W = asp.w, H = asp.h;
  const boxes = getBoxes(s.layout||"full", W, H);
  let defs = "", body = "";

  body += `<rect width="${W}" height="${H}" fill="${s.bgColor}"/>`;

  if(s.image){
    const natW = s.imageEl ? s.imageEl.naturalWidth : W, natH = s.imageEl ? s.imageEl.naturalHeight : H;
    const cb = computeImageBox(natW, natH, boxes.image.w, boxes.image.h, s.imageScale||1, s.imageOffsetX, s.imageOffsetY);
    const clipId = `clip${idx}`;
    defs += `<clipPath id="${clipId}"><rect x="${boxes.image.x}" y="${boxes.image.y}" width="${boxes.image.w}" height="${boxes.image.h}"/></clipPath>`;
    body += `<g clip-path="url(#${clipId})"><image href="${s.image}" x="${(boxes.image.x+cb.left).toFixed(1)}" y="${(boxes.image.y+cb.top).toFixed(1)}" width="${cb.dw.toFixed(1)}" height="${cb.dh.toFixed(1)}"/></g>`;

    if((s.layout||"full")==="full"){
      const res = overlaySVG(defs, body, boxes.image, s.overlayDirection, (s.overlayOpacity??55)/100, `grad${idx}`);
      defs = res.defs; body = res.body;
    }
  }

  const pad = basePad(W);
  const availW = boxes.text.w - 2*pad;
  const ts = textSizes(W, s);

  const measCanvas = document.createElement("canvas");
  const mctx = measCanvas.getContext("2d");
  mctx.font = `${fp.headWeight} ${ts.headPx}px "${fp.headName}"`;
  const headLines = wrapLines(mctx, s.heading||"", availW);
  const hasBody = s.body && s.body.trim()!=="";
  mctx.font = `${fp.bodyWeight} ${ts.bodyPx}px "${fp.bodyName}"`;
  const bodyLines = hasBody ? wrapLines(mctx, s.body, availW) : [];

  const headBlockH = headLines.length*ts.headLH;
  const bodyBlockH = bodyLines.length*ts.bodyLH;
  const totalH = headBlockH + (hasBody? ts.gap+bodyBlockH : 0);

  const textTop = boxes.text.y + pad, textBottom = boxes.text.y + boxes.text.h - pad;
  let startY;
  if(s.position==="top") startY = textTop;
  else if(s.position==="bottom") startY = textBottom - totalH;
  else startY = textTop + ((textBottom-textTop)-totalH)/2;

  const toX = s.textOffsetX||0, toY = s.textOffsetY||0;
  startY += toY;
  const x = (s.align==="center" ? boxes.text.x + boxes.text.w/2 : boxes.text.x + pad) + toX;
  const anchor = s.align==="center" ? "middle" : "start";

  body += `<text x="${x}" y="${startY + ts.headPx*0.86}" font-family="${fp.headName}" font-weight="${fp.headWeight}" font-size="${ts.headPx.toFixed(1)}" fill="${s.textColor}" text-anchor="${anchor}">`;
  headLines.forEach((line,i)=>{ body += `<tspan x="${x}" ${i===0?"":`dy="${ts.headLH}"`}>${escapeXML(line||" ")}</tspan>`; });
  body += `</text>`;

  if(hasBody){
    const bodyStartY = startY + headBlockH + ts.gap;
    body += `<text x="${x}" y="${bodyStartY + ts.bodyPx*0.86}" font-family="${fp.bodyName}" font-weight="${fp.bodyWeight}" font-size="${ts.bodyPx.toFixed(1)}" fill="${s.textColor}" text-anchor="${anchor}">`;
    bodyLines.forEach((line,i)=>{ body += `<tspan x="${x}" ${i===0?"":`dy="${ts.bodyLH}"`}>${escapeXML(line||" ")}</tspan>`; });
    body += `</text>`;
  }

  if(state.showPageNum){
    const label = `${idx+1}/${state.slides.length}`;
    const badgePx = W*0.026;
    mctx.font = `700 ${badgePx.toFixed(1)}px "${fp.bodyName}"`;
    const textW = mctx.measureText(label).width;
    const padX = W*0.022, padY = W*0.011;
    const bw = textW + padX*2, bh = badgePx + padY*2;
    const bx = W - W*0.05 - bw;
    const by = state.badgePos==="top" ? W*0.05 : H - W*0.05 - bh;
    body += `<rect x="${bx.toFixed(1)}" y="${by.toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" rx="${(bh/2).toFixed(1)}" fill="${state.accent}"/>`;
    body += `<text x="${(bx+bw/2).toFixed(1)}" y="${(by+bh/2+badgePx*0.35).toFixed(1)}" font-family="${fp.bodyName}" font-weight="700" font-size="${badgePx.toFixed(1)}" fill="${state.badgeTextColor}" text-anchor="middle">${escapeXML(label)}</text>`;
  }

  return `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}"><defs>${defs}</defs>${body}</svg>`;
}

function exportCurrentSVG(){
  const svg = buildSlideSVG(state.slides[state.active], state.active);
  saveBlob(new Blob([svg], {type:"image/svg+xml"}), `slide-${state.active+1}.svg`);
}
async function exportAllSVG(){
  const zip = new JSZip();
  state.slides.forEach((s,i)=>{ zip.file(`slide-${i+1}.svg`, buildSlideSVG(s,i)); });
  const content = await zip.generateAsync({type:"blob"});
  saveBlob(content, "carousel-svg.zip");
}

/* ============================= INIT ============================= */
function openSidebarMobile(){
  document.getElementById("sidebar").classList.add("open");
  document.getElementById("sidebarBackdrop").classList.add("open");
  document.getElementById("sidebarCloseBtn").classList.add("open");
}
function closeSidebarMobile(){
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("sidebarBackdrop").classList.remove("open");
  document.getElementById("sidebarCloseBtn").classList.remove("open");
}
document.getElementById("mobileMenuBtn").onclick = openSidebarMobile;
document.getElementById("sidebarBackdrop").onclick = closeSidebarMobile;
document.getElementById("sidebarCloseBtn").onclick = closeSidebarMobile;
window.addEventListener("orientationchange", ()=>setTimeout(renderStage, 200));

renderAll();
</script>
