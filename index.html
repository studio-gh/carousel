<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Carousel Studio</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9A%A1%EF%B8%8F%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Work+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=Poppins:wght@400;500;600;700;800;900&family=DM+Sans:wght@400;500;600;700;800;900&family=Manrope:wght@400;500;600;700;800&family=Archivo:wght@400;500;600;700;800;900&family=Nunito+Sans:wght@400;500;600;700;800;900&family=Playfair+Display:wght@400;500;600;700;800;900&family=Fraunces:wght@400;500;600;700;800;900&family=Libre+Baskerville:wght@400;700&family=Source+Serif+4:wght@400;500;600;700;800;900&family=Lora:wght@400;500;600;700&family=Cormorant:wght@400;500;600;700&family=Archivo+Black&family=Bebas+Neue&family=Anton&family=Bricolage+Grotesque:wght@400;500;600;700;800&family=Unbounded:wght@400;500;600;700;800;900&family=Big+Shoulders:wght@400;500;600;700;800;900&family=Space+Mono:wght@400;700&family=JetBrains+Mono:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&family=Caveat:wght@400;500;600;700&family=Pacifico&family=Dancing+Script:wght@400;500;600;700&family=Kalam:wght@300;400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  :root{
    --bg:#2C2C2C; --surface:#363636; --surface-hover:#404040;
    --ink:#FFFCF4; --muted:rgba(255,252,244,.55); --line:rgba(255,252,244,.16); --line-strong:rgba(255,252,244,.3);
    --panel:#2C2C2C; --app-bg:#2C2C2C;
    --accent-ui:#FFAD2A; --accent-ui-soft:rgba(255,173,42,.16); --danger:#FF6B5B;
    --accent-ui-ink:#2C2C2C;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0; background:var(--app-bg); color:var(--ink);
    font-family:"Inter",-apple-system,sans-serif;
    display:flex; flex-direction:column; height:100vh; height:100dvh; overflow:hidden;
  }
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 20px; background:var(--panel); border-bottom:1px solid var(--line);
    flex-shrink:0;
  }
  .brand{display:flex; align-items:center; gap:10px; font-family:"Space Grotesk",sans-serif; font-weight:700; font-size:17px;}
  .brand .dot{width:9px; height:9px; border-radius:50%; background:var(--accent-ui); flex-shrink:0;}
  .topbar-actions{display:flex; align-items:center; gap:10px;}
  .btn{
    font-family:"Inter",sans-serif; font-size:13px; font-weight:600; border-radius:8px;
    border:1px solid var(--line); background:var(--panel); color:var(--ink);
    padding:8px 14px; cursor:pointer; display:inline-flex; align-items:center; gap:6px;
    transition:background .1s ease, border-color .1s ease;
  }
  .btn:hover{background:var(--surface-hover); border-color:var(--line-strong);}
  .btn.primary{background:var(--accent-ui); border-color:var(--accent-ui); color:var(--accent-ui-ink);}
  .btn.primary:hover{background:#E69A1E;}
  .btn:disabled{opacity:.4; cursor:not-allowed;}
  .btn.small{padding:5px 9px; font-size:12px; border-radius:6px;}
  .btn.full{width:100%; justify-content:center;}
  .dropdown{position:relative; display:inline-block;}
  .dropdown-menu{
    position:absolute; top:calc(100% + 6px); right:0; background:var(--panel);
    border:1px solid var(--line); border-radius:10px; box-shadow:0 8px 24px rgba(20,22,26,.12);
    padding:6px; min-width:190px; display:none; z-index:50;
  }
  .dropdown.open .dropdown-menu{display:block;}
  .dropdown-menu button{
    width:100%; text-align:left; background:none; border:none; padding:9px 10px;
    font-size:13px; font-family:"Inter",sans-serif; border-radius:6px; cursor:pointer; color:var(--ink);
  }
  .dropdown-menu button:hover{background:var(--accent-ui-soft); color:var(--accent-ui);}
  .dropdown-menu .hint{font-size:11px; color:var(--muted); padding:6px 10px 2px;}

  .workspace{flex:1; display:flex; min-height:0;}
  .sidebar{
    width:365px; flex-shrink:0; background:var(--panel); border-right:1px solid var(--line);
    overflow-y:auto; padding:18px 16px 40px;
  }
  .section-group{ border-bottom:1px solid var(--line); margin-bottom:4px; }
  .section-group:last-child{ border-bottom:none; }
  .section-toggle{
    width:100%; display:flex; align-items:center; justify-content:space-between;
    background:none; border:none; padding:11px 2px; cursor:pointer;
    font-family:"Inter",sans-serif; font-size:12.5px; font-weight:700; color:var(--ink);
    letter-spacing:.01em; text-align:left;
  }
  .section-toggle .chev{ font-size:18px; line-height:1; color:var(--muted); transition:transform .15s ease; flex-shrink:0; }
  .section-toggle[aria-expanded="true"] .chev{ transform:rotate(180deg); }
  .section-toggle:hover .chev{ color:var(--accent-ui); }
  .section-body{ padding-bottom:14px; }
  .section-body.nested{ border-top:1px dashed var(--line); margin-top:10px; padding-top:12px; }
  .stage-wrap{flex:1; display:flex; flex-direction:column; min-width:0;}
  .stage{
    flex:1; display:flex; align-items:center; justify-content:center; padding:30px; min-height:0;
    overflow:auto; position:relative; transition: background .15s ease;
  }
  .stage.drag-over{ background:rgba(255,173,42,.08); }
  .stage.drag-over::after{
    content:"Drop image to add it to this slide"; position:absolute; inset:14px; border:2px dashed var(--accent-ui);
    border-radius:12px; display:flex; align-items:center; justify-content:center; color:var(--accent-ui);
    font-size:14px; font-weight:600; pointer-events:none; background:rgba(44,44,44,.55);
  }
  .section-label{
    font-size:11px; font-weight:700; letter-spacing:.06em; text-transform:uppercase;
    color:var(--muted); margin:22px 0 10px;
  }
  .section-label:first-child{margin-top:0;}
  .field{margin-bottom:12px;}
  .field label{display:block; font-size:12.5px; font-weight:600; color:var(--ink); margin-bottom:6px;}
  select, .stepper input, input[type=text]{
    width:100%; font-family:"Inter",sans-serif; font-size:13px; padding:8px 10px;
    border:1px solid var(--line); border-radius:8px; background:var(--surface); color:var(--ink);
  }
  .row2{display:grid; grid-template-columns:1fr 1fr; gap:8px;}
  .stepper{display:flex; align-items:center; gap:8px;}
  .stepper button{
    width:30px; height:30px; border-radius:8px; border:1px solid var(--line); background:var(--surface); color:var(--ink);
    font-size:15px; cursor:pointer; flex-shrink:0;
  }
  .stepper button:hover{background:var(--surface-hover);}
  .stepper span{font-size:13px; font-weight:600; min-width:20px; text-align:center;}
  .segmented{display:flex; border:1px solid var(--line); border-radius:8px; overflow:hidden;}
  .segmented button{
    flex:1; padding:7px 4px; font-size:12px; font-weight:600; background:var(--surface); border:none;
    cursor:pointer; color:var(--muted); border-right:1px solid var(--line);
  }
  .segmented button:last-child{border-right:none;}
  .segmented button.active{background:var(--accent-ui); color:var(--accent-ui-ink);}
  .colorfield{display:flex; align-items:center; gap:8px; border:1px solid var(--line); border-radius:8px; padding:5px 8px;}
  .colorfield input[type=color]{width:26px; height:26px; border:none; padding:0; background:none; cursor:pointer; flex-shrink:0;}
  .colorfield input.hexinput{
    font-size:12px; color:var(--muted); font-family:"IBM Plex Mono",monospace; border:none; background:none;
    padding:0; width:100%; outline:none;
  }
  .colorfield input.hexinput:focus{ color:var(--ink); }
  input[type=range]{width:100%; accent-color:var(--accent-ui);}
  .rangeval{font-size:11px; color:var(--muted); float:right; font-weight:600;}
  .imgctrl{display:flex; gap:8px;}
  .imgctrl .btn{flex:1; justify-content:center;}
  .toggle-row{display:flex; align-items:center; justify-content:space-between;}
  .switch{position:relative; width:36px; height:20px; flex-shrink:0;}
  .switch input{opacity:0; width:0; height:0;}
  .slider-tg{position:absolute; inset:0; background:var(--surface-hover); border-radius:20px; cursor:pointer; transition:.15s;}
  .slider-tg:before{content:""; position:absolute; width:16px; height:16px; left:2px; top:2px; background:#fff; border-radius:50%; transition:.15s;}
  input:checked + .slider-tg{background:var(--accent-ui);}
  input:checked + .slider-tg:before{transform:translateX(16px);}
  .empty-hint{font-size:11.5px; color:var(--muted); line-height:1.5; background:var(--surface); border-radius:8px; padding:9px 11px; margin-top:4px;}
  .layout-grid{display:grid; grid-template-columns:1fr 1fr; gap:6px;}
  .layout-opt{
    border:1.5px solid var(--line); border-radius:8px; padding:6px; cursor:pointer; background:var(--surface);
    display:flex; flex-direction:column; align-items:center; gap:4px;
  }
  .layout-opt svg{width:100%; height:34px;}
  .layout-opt span{font-size:10.5px; color:var(--muted); font-weight:600; text-align:center;}
  .layout-opt.active{border-color:var(--accent-ui); background:var(--accent-ui-soft);}
  .layout-opt.active span{color:var(--accent-ui);}
  .layout-opt.full-span{grid-column:1/3;}
  .overlay-grid{display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px;}
  .overlay-opt{
    border:1.5px solid var(--line); border-radius:8px; padding:6px 2px; cursor:pointer; background:var(--surface);
    font-size:11px; font-weight:600; color:var(--muted); text-align:center;
  }
  .overlay-opt.active{border-color:var(--accent-ui); background:var(--accent-ui-soft); color:var(--accent-ui);}

  /* ---------- Slide canvas ---------- */
  .slide{ position:relative; overflow:hidden; background:#fff; box-shadow:0 20px 50px rgba(20,22,26,.18); border-radius:3px; flex-shrink:0; }
  .thumb-frame .slide{box-shadow:none; border-radius:0;}
  .frame-image{position:absolute; overflow:hidden;}
  .frame-image img{position:absolute; max-width:none; -webkit-user-drag:none; user-select:none;}
  .frame-image.editable img{cursor:grab; touch-action:none;}
  .frame-image.editable img.dragging{cursor:grabbing;}
  .text-drag-handle{
    position:absolute; top:-14px; left:-14px; width:28px; height:28px; border-radius:50%;
    background:var(--accent-ui); color:#1A1A1A; display:flex; align-items:center; justify-content:center;
    font-size:14px; cursor:grab; touch-action:none; box-shadow:0 2px 6px rgba(0,0,0,.4); z-index:5;
  }
  .text-drag-handle.dragging{cursor:grabbing;}
  .slide-overlay{position:absolute; pointer-events:none;}
  .slide-overlay.dir-bottom{background:linear-gradient(to bottom, rgba(0,0,0,0) 25%, rgba(0,0,0,var(--ov)) 100%);}
  .slide-overlay.dir-top{background:linear-gradient(to top, rgba(0,0,0,0) 25%, rgba(0,0,0,var(--ov)) 100%);}
  .slide-overlay.dir-left{background:linear-gradient(to left, rgba(0,0,0,0) 25%, rgba(0,0,0,var(--ov)) 100%);}
  .slide-overlay.dir-right{background:linear-gradient(to right, rgba(0,0,0,0) 25%, rgba(0,0,0,var(--ov)) 100%);}
  .slide-overlay.dir-radial{background:radial-gradient(circle, rgba(0,0,0,0) 35%, rgba(0,0,0,var(--ov)) 100%);}
  .slide-overlay.dir-flat{background:rgba(0,0,0,var(--ov));}
  .frame-text{position:absolute; display:flex; flex-direction:column; overflow:visible; pointer-events:none;}
  .frame-text .slide-heading, .frame-text .slide-body, .frame-text .text-drag-handle, .frame-text .text-resize-handle{ pointer-events:auto; }
  .text-resize-handle{
    position:absolute; right:-7px; bottom:-7px; width:15px; height:15px; border-radius:50%;
    background:var(--accent-ui); border:2px solid var(--panel); cursor:nwse-resize; z-index:5;
    box-shadow:0 1px 4px rgba(0,0,0,.4);
  }
  .text-resize-handle.dragging{ transform:scale(1.15); }
  .slide-kicker{ font-weight:700; letter-spacing:.08em; text-transform:uppercase; opacity:.7; }
  .frame-text.pos-top{justify-content:flex-start;}
  .frame-text.pos-center{justify-content:center;}
  .frame-text.pos-bottom{justify-content:flex-end;}
  .frame-text.align-left{align-items:flex-start; text-align:left;}
  .frame-text.align-center{align-items:center; text-align:center;}
  .slide-heading{margin:0; outline:none; white-space:pre-wrap; word-wrap:break-word; width:100%;}
  .slide-body{margin:0; outline:none; white-space:pre-wrap; word-wrap:break-word; width:100%;}
  .slide-badge{position:absolute; border-radius:999px; display:flex; align-items:center; justify-content:center; white-space:nowrap;}
  .slide-signature-row{position:absolute; display:flex; align-items:center; gap:12px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; opacity:.75; box-sizing:border-box;}
  .slide-signature-side{white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .slide-swipe-hint{position:absolute; display:flex; align-items:center; gap:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; opacity:.7;}
  .slide-swipe-hint .ssh-line{flex:1; height:1px; background:currentColor; opacity:.9;}
  .slide-swipe-hint .ssh-arrow{font-size:1.3em; line-height:1;}
  .logo-pos-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:6px; width:132px;}
  .logo-pos-opt{
    aspect-ratio:1; border:1px solid var(--line); border-radius:6px; background:rgba(255,252,244,.04);
    cursor:pointer; display:flex; align-items:center; justify-content:center;
  }
  .logo-pos-opt.empty{ border:none; background:none; cursor:default; }
  .logo-pos-opt.active{ border-color:var(--accent-ui); background:var(--accent-ui-soft); }
  .logo-pos-opt span{ width:8px; height:8px; border-radius:2px; background:var(--muted); }
  .logo-pos-opt.active span{ background:var(--accent-ui); }
  .slide-logo{position:absolute; object-fit:contain; pointer-events:none;}

  .rail{
    display:flex; align-items:flex-end; gap:12px; padding:14px 20px; background:var(--panel);
    border-top:1px solid var(--line); overflow-x:auto; flex-shrink:0;
  }
  .thumb-wrap{position:relative; flex-shrink:0; cursor:pointer; touch-action:pan-x;}
  .thumb-wrap.thumb-dragging{ opacity:.55; z-index:30; cursor:grabbing; transition:none; }
  .thumb-wrap.thumb-drop-target .thumb-frame{ box-shadow: -3px 0 0 var(--accent-ui), 0 2px 8px rgba(0,0,0,.35); }
  .thumb-frame{
    width:74px; overflow:hidden; border-radius:6px; border:2px solid transparent; position:relative;
    box-shadow:0 2px 8px rgba(0,0,0,.35); background:var(--surface);
  }
  .thumb-wrap.active .thumb-frame{border-color:var(--accent-ui);}
  .thumb-inner{transform-origin:top left; pointer-events:none;}
  .thumb-num{font-size:11px; color:var(--muted); text-align:center; margin-top:5px; font-weight:600;}
  .thumb-actions{ position:absolute; top:3px; right:3px; display:flex; gap:3px; opacity:0; transition:.12s; }
  .thumb-wrap:hover .thumb-actions{opacity:1;}
  .thumb-actions button{
    width:18px; height:18px; border-radius:4px; border:none; background:rgba(20,22,26,.65);
    color:#fff; font-size:11px; line-height:1; cursor:pointer; display:flex; align-items:center; justify-content:center;
  }
  .thumb-actions button:hover{background:rgba(20,22,26,.9);}
  .add-slide-btn{
    flex-shrink:0; width:74px; height:92px; border-radius:6px; border:2px dashed var(--line-strong);
    background:none; color:var(--muted); font-size:22px; cursor:pointer; display:flex; align-items:center; justify-content:center;
  }
  .add-slide-btn:hover{border-color:var(--accent-ui); color:var(--accent-ui);}
  *:focus-visible{ outline:2px solid var(--accent-ui); outline-offset:2px; border-radius:4px; }
  .btn, .segmented button, .layout-opt, .overlay-opt, select, input[type=color], .stepper button, .thumb-frame, .add-slide-btn, .slider-tg, .switch input + .slider-tg:before {
    transition: transform .12s ease, background .15s ease, border-color .15s ease, box-shadow .15s ease, opacity .15s ease;
  }
  .btn:active, .stepper button:active{ transform: scale(.94); }
  .layout-opt:active, .overlay-opt:active{ transform: scale(.96); }
  .layout-opt:hover, .overlay-opt:hover{ border-color:var(--line-strong); }
  .layout-opt, .overlay-opt{ cursor:pointer; }
  .thumb-wrap .thumb-frame{ transition: transform .15s ease, border-color .15s ease; }
  .thumb-wrap:hover .thumb-frame{ transform: translateY(-2px); }
  .thumb-wrap.active .thumb-frame{ transform: translateY(-2px); }
  .stage .slide{ animation: slideIn .18s ease; }
  @keyframes slideIn{ from{ opacity:.4; transform:scale(.98); } to{ opacity:1; transform:scale(1); } }
  .dropdown-menu{ transition: opacity .12s ease, transform .12s ease; transform-origin: top right; }
  .toast{
    position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(20px); z-index:500;
    background:var(--accent-ui); color:#1A1A1A; font-weight:700; font-size:13px; padding:10px 18px;
    border-radius:999px; box-shadow:0 8px 24px rgba(0,0,0,.4); opacity:0; pointer-events:none;
    transition: opacity .2s ease, transform .2s ease;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
  .field label .tip{
    display:inline-flex; align-items:center; justify-content:center; width:15px; height:15px; border-radius:50%;
    background:rgba(255,252,244,.16); color:var(--muted); font-size:10px; font-weight:700; margin-left:5px; cursor:help;
  }
  .btn-short{display:none;}
  .mobile-menu-btn{
    display:none; align-items:center; justify-content:center; width:40px; height:40px;
    border-radius:9px; border:1.5px solid var(--accent-ui); background:var(--accent-ui-soft); color:var(--accent-ui);
    font-size:19px; cursor:pointer; margin-right:10px; flex-shrink:0;
  }
  .mobile-menu-btn:active{ transform:scale(.94); }
  .sidebar-backdrop{display:none;}
  .sidebar-close-btn{display:none;}

  @media (max-width: 820px){
    .mobile-menu-btn{ display:flex; }
    .brand{ font-size:15px; }
    .topbar{ padding:9px 12px; }
    .btn{ padding:8px 10px; font-size:12.5px; }
    .btn-full{display:none;}
    .btn-short{display:inline;}
    .sidebar{
      position:fixed; top:0; left:0; height:100%; width:88%; max-width:380px;
      transform:translateX(-100%); transition:transform .22s ease; z-index:210;
      box-shadow:0 0 40px rgba(0,0,0,.5); padding-top:56px;
    }
    .sidebar.open{ transform:translateX(0); }
    .sidebar-backdrop.open{
      display:block; position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:200;
    }
    .sidebar-close-btn.open{
      display:flex; position:fixed; top:12px; left:calc(min(88vw, 380px) - 44px); z-index:220; border-radius:8px; border:1px solid var(--line);
      background:var(--panel); color:var(--ink); font-size:16px; align-items:center; justify-content:center; cursor:pointer;
    }
    .stage{ padding:16px; }
    .rail{ padding:10px 14px; gap:9px; }
    .segmented button{ padding:10px 4px; }
    .layout-opt, .overlay-opt{ padding:9px 6px; }
    .thumb-actions button{ width:22px; height:22px; font-size:13px; }
  }
  .credit-strip{
    flex-shrink:0; display:flex; align-items:center; justify-content:center; gap:10px;
    padding:6px 12px; background:var(--panel); border-top:1px solid var(--line);
  }
  .credit{
    font-family:"Inter",sans-serif; font-weight:400; font-size:11.5px;
    color:rgba(255,252,244,.42); pointer-events:none; user-select:none; letter-spacing:.01em;
  }
  .coffee-btn{
    display:inline-flex; align-items:center; gap:6px; font-family:"Inter",sans-serif; font-weight:600; font-size:12px;
    color:#1A1A1A; background:#FFDD00; padding:6px 12px; border-radius:999px; text-decoration:none;
    box-shadow:0 2px 6px rgba(0,0,0,.3); transition: transform .12s ease, box-shadow .12s ease;
  }
  .coffee-btn:hover{ transform:translateY(-1px); box-shadow:0 4px 10px rgba(0,0,0,.4); }
  .coffee-btn:active{ transform:scale(.96); }
</style>
</head>
<body>

<div class="topbar">
  <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Open editing panel">&#9776;</button>
  <div class="brand"><span class="dot"></span>Carousel Studio</div>
  <div class="topbar-actions">
    <button class="btn small" id="undoBtn" onclick="undo()" title="Undo (Ctrl/Cmd+Z)" aria-label="Undo" disabled>&#8630;</button>
    <button class="btn small" id="redoBtn" onclick="redo()" title="Redo (Ctrl/Cmd+Shift+Z)" aria-label="Redo" disabled>&#8631;</button>
    <div class="dropdown" id="pngDropdown">
      <button class="btn primary" onclick="toggleDropdown('pngDropdown')">&#11015;&#65039; <span class="btn-full">Download PNG</span><span class="btn-short">PNG</span> &#9662;</button>
      <div class="dropdown-menu">
        <div class="hint">Flat images</div>
        <button onclick="exportCurrentPNG()">This slide</button>
        <button onclick="exportAllPNGSeparate()">All slides (one by one)</button>
        <button onclick="exportAllPNG()">All slides (.zip)</button>
      </div>
    </div>
    <div class="dropdown" id="svgDropdown">

/* ============================= UNDO / REDO ============================= */
/* Snapshot-based history: after each settled edit we store a deep clone of `state`
   (minus the non-serializable Image objects). Undo/redo restore a snapshot and
   reload images from their data URLs. Simpler and far more reliable than trying
   to track every individual mutation as a discrete "operation". */
let historyStack = [];
let redoStack = [];
const HISTORY_LIMIT = 40;
let isRestoringHistory = false;

function snapshotState(){
  return JSON.parse(JSON.stringify(state, (k,v)=> (k==="imageEl"||k==="layer2ImageEl"||k==="logoImageEl") ? undefined : v));
}
function pushHistory(){
  if(isRestoringHistory) return;
  const snap = snapshotState();
  const snapStr = JSON.stringify(snap);
  if(historyStack.length && JSON.stringify(historyStack[historyStack.length-1])===snapStr) return;
  historyStack.push(snap);
  if(historyStack.length>HISTORY_LIMIT) historyStack.shift();
  redoStack = [];
  updateUndoRedoButtons();
}
function applySnapshotInPlace(snap){
  Object.keys(state).forEach(k=>delete state[k]);
  Object.assign(state, snap);
}
async function restoreSnapshot(snap){
  isRestoringHistory = true;
  const cloned = JSON.parse(JSON.stringify(snap));
  for(const s of cloned.slides){
    s.imageEl = s.image ? await loadImageEl(s.image) : null;
    s.layer2ImageEl = s.layer2Image ? await loadImageEl(s.layer2Image) : null;
    s.logoImageEl = s.logoImage ? await loadImageEl(s.logoImage) : null;
  }
  applySnapshotInPlace(cloned);
  if(state.active >= state.slides.length) state.active = state.slides.length-1;
  renderAll();
  isRestoringHistory = false;
  updateUndoRedoButtons();
}
function undo(){
  if(historyStack.length<2) return;
  const current = historyStack.pop();
  redoStack.push(current);
  restoreSnapshot(historyStack[historyStack.length-1]);
}
function redo(){
  if(redoStack.length===0) return;
  const snap = redoStack.pop();
  historyStack.push(snap);
  restoreSnapshot(snap);
}
function updateUndoRedoButtons(){
  const u = document.getElementById("undoBtn"), r = document.getElementById("redoBtn");
  if(u) u.disabled = historyStack.length<2;
  if(r) r.disabled = redoStack.length===0;
}
document.addEventListener("keydown", e=>{
  const mod = e.metaKey || e.ctrlKey;
  if(!mod) return;
  const k = e.key.toLowerCase();
  if(k==="z" && !e.shiftKey){ e.preventDefault(); undo(); }
  else if((k==="z" && e.shiftKey) || k==="y"){ e.preventDefault(); redo(); }
});

function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }
function escapeXML(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&apos;"); }
function escAttr(s){ return (s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;"); }
const HEX_RE = /^#([0-9a-fA-F]{3}|[0-9a-fA-F]{6})$/;
function colorFieldHTML(id, value){
  const v = value || "#000000";
  return `<div class="colorfield">
    <input type="color" id="${id}" value="${v}">
    <input type="text" class="hexinput" id="${id}Hex" value="${v}" maxlength="7" spellcheck="false" autocomplete="off" aria-label="Hex color code">
  </div>`;
}
/* Wire a colorFieldHTML() pair together: picking a color updates the hex text, and typing a
   valid hex code (with or without '#') updates the swatch. onChange fires with the new value
   on every valid update; onCommit fires once editing settles (for undo history / thumb refresh). */
function wireColorField(id, onChange, onCommit){
  const colorInp = document.getElementById(id);
  const hexInp = document.getElementById(id+"Hex");
  if(!colorInp || !hexInp) return;
  colorInp.oninput = e=>{ hexInp.value = e.target.value; onChange(e.target.value); };
  colorInp.onchange = ()=>{ if(onCommit) onCommit(); };
  hexInp.oninput = e=>{
    let v = e.target.value.trim();
    if(v && v[0]!=="#") v = "#"+v;
    if(HEX_RE.test(v)){ colorInp.value = v; onChange(v); }
  };
  hexInp.onchange = e=>{
    let v = e.target.value.trim();
    if(v && v[0]!=="#") v = "#"+v;
    if(!HEX_RE.test(v)) v = colorInp.value;
    hexInp.value = v;
    if(onCommit) onCommit();
  };
}
function saveBlob(blob, filename){
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 2000);
  showToast("Downloaded " + filename);
}
let toastTimer = null;
function showToast(msg){
  let t = document.querySelector(".toast");
  if(!t){ t = document.createElement("div"); t.className = "toast"; document.body.appendChild(t); }
  t.textContent = msg;
  requestAnimationFrame(()=>t.classList.add("show"));
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove("show"), 2400);
}

function wrapLines(ctx, text, maxWidth){
  const paras = text.split("\n");
  let lines = [];
  paras.forEach(p=>{
    if(p===""){ lines.push(""); return; }
    const words = p.split(" ");
    let line = "";
    words.forEach(w=>{
      const test = line ? line+" "+w : w;
      if(ctx.measureText(test).width > maxWidth && line){ lines.push(line); line = w; }
      else line = test;
    });
    lines.push(line);
  });
  return lines;
}
function loadImageEl(dataURL){
  return new Promise(res=>{ const img = new Image(); img.onload = ()=>res(img); img.src = dataURL; });
}
function applyImageFileToActiveSlide(file){

function getBoxes(layout, W, H){
  switch(layout){
    case "left":   return { image:{x:0,y:0,w:W/2,h:H}, text:{x:W/2,y:0,w:W/2,h:H} };
    case "right":  return { image:{x:W/2,y:0,w:W/2,h:H}, text:{x:0,y:0,w:W/2,h:H} };
    case "top":    return { image:{x:0,y:0,w:W,h:H/2}, text:{x:0,y:H/2,w:W,h:H/2} };
    case "bottom": return { image:{x:0,y:H/2,w:W,h:H/2}, text:{x:0,y:0,w:W,h:H/2} };
    default:       return { image:{x:0,y:0,w:W,h:H}, text:{x:0,y:0,w:W,h:H} };
  }
}
function computeImageBox(natW, natH, boxW, boxH, scale, offX, offY){
  const coverScale = Math.max(boxW/natW, boxH/natH);
  const finalScale = coverScale * Math.max(1, scale||1);
  const dw = natW*finalScale, dh = natH*finalScale;
  const excessX = Math.max(0, dw-boxW), excessY = Math.max(0, dh-boxH);
  const left = -excessX*(offX??0.5), top = -excessY*(offY??0.5);
  return { dw, dh, left, top, excessX, excessY };
}
function basePad(W){ return W*0.08; }
function logoPosition(pos, W, H, lw, lh){
  const pad = W*0.05;
  switch(pos){
    case "tl": return { x:pad, y:pad };
    case "tr": return { x:W-pad-lw, y:pad };
    case "bl": return { x:pad, y:H-pad-lh };
    case "br": return { x:W-pad-lw, y:H-pad-lh };
    case "top": return { x:(W-lw)/2, y:pad };
    case "bottom": return { x:(W-lw)/2, y:H-pad-lh };
    case "center": default: return { x:(W-lw)/2, y:(H-lh)/2 };
  }
}

function cloneSlide(s){
  const c = JSON.parse(JSON.stringify(s, (k,v)=> (k==="imageEl"||k==="layer2ImageEl"||k==="logoImageEl") ? undefined : v));
  c.imageEl = s.imageEl;
  c.layer2ImageEl = s.layer2ImageEl;
  c.logoImageEl = s.logoImageEl;
  return c;
}

/* ============================= SLIDE DOM BUILD ============================= */
function buildSlideDOM(s, idx, editable, W){
  const asp = ASPECTS[state.aspect];
  const H = W * asp.h/asp.w;
  const fp = {
    headFont: fontFamilyCSS(state.headFont), headWeight: state.headWeight, headName: state.headFont,
    bodyFont: fontFamilyCSS(state.bodyFont), bodyWeight: state.bodyWeight, bodyName: state.bodyFont,
  };
  const boxes = getBoxes(s.layout||"full", W, H);

  const div = document.createElement("div");
  div.className = "slide";
  div.style.width = W+"px"; div.style.height = H+"px";
  div.style.background = s.bgColor;

  if(editable) layerLiveRefs = {};

  if(s.image && s.imageEl){
    const layer2Active = !!(s.layer2Image && s.layer2ImageEl);
    const dragLayer1 = !layer2Active || s.dragLayer!=="layer2";

    const frameImg = document.createElement("div");
    frameImg.className = "frame-image" + (editable ? " editable" : "");
    frameImg.style.left = boxes.image.x+"px"; frameImg.style.top = boxes.image.y+"px";
    frameImg.style.width = boxes.image.w+"px"; frameImg.style.height = boxes.image.h+"px";
    frameImg.style.borderRadius = ((s.imageRadius||0)*W)+"px";

    const img = document.createElement("img");
    img.src = s.image; img.draggable = false;
    const cb = computeImageBox(s.imageEl.naturalWidth, s.imageEl.naturalHeight, boxes.image.w, boxes.image.h, s.imageScale||1, s.imageOffsetX, s.imageOffsetY);
    img.style.left = cb.left+"px"; img.style.top = cb.top+"px";
    img.style.width = cb.dw+"px"; img.style.height = cb.dh+"px";
    frameImg.appendChild(img);
    div.appendChild(frameImg);

    if(editable){
      const r = makeImgRefs(s, "", boxes.image.w, boxes.image.h, s.imageEl.naturalWidth, s.imageEl.naturalHeight);
      img._imgRefs = r;
      img.style.pointerEvents = dragLayer1 ? "auto" : "none";
      if(dragLayer1) img.addEventListener("pointerdown", onImageDragStart);
      layerLiveRefs.layer1 = { imgEl:img, r };
    }

    if(layer2Active){
      const frameImg2 = document.createElement("div");
      frameImg2.className = "frame-image" + (editable ? " editable" : "");
      frameImg2.style.left = boxes.image.x+"px"; frameImg2.style.top = boxes.image.y+"px";
      frameImg2.style.width = boxes.image.w+"px"; frameImg2.style.height = boxes.image.h+"px";
      frameImg2.style.borderRadius = ((s.imageRadius||0)*W)+"px";
      frameImg2.style.opacity = (s.layer2Opacity??60)/100;
      frameImg2.style.mixBlendMode = (s.layer2Blend && s.layer2Blend!=="normal") ? s.layer2Blend : "normal";

      const img2 = document.createElement("img");
      img2.src = s.layer2Image; img2.draggable = false;
      const cb2 = computeImageBox(s.layer2ImageEl.naturalWidth, s.layer2ImageEl.naturalHeight, boxes.image.w, boxes.image.h, s.layer2Scale||1, s.layer2OffsetX, s.layer2OffsetY);
      img2.style.left = cb2.left+"px"; img2.style.top = cb2.top+"px";
      img2.style.width = cb2.dw+"px"; img2.style.height = cb2.dh+"px";
      frameImg2.appendChild(img2);
      div.appendChild(frameImg2);

      if(editable){
        const r2 = makeImgRefs(s, "layer2", boxes.image.w, boxes.image.h, s.layer2ImageEl.naturalWidth, s.layer2ImageEl.naturalHeight);
        img2._imgRefs = r2;
        const dragLayer2 = s.dragLayer==="layer2";
        img2.style.pointerEvents = dragLayer2 ? "auto" : "none";
        if(dragLayer2) img2.addEventListener("pointerdown", onImageDragStart);
        layerLiveRefs.layer2 = { imgEl:img2, r:r2 };
      }
    }

    if((s.layout||"full")==="full" && s.overlayDirection && s.overlayDirection!=="none"){
      const ov = document.createElement("div");
      ov.className = `slide-overlay dir-${s.overlayDirection}`;
      ov.style.left = boxes.image.x+"px"; ov.style.top = boxes.image.y+"px";
      ov.style.width = boxes.image.w+"px"; ov.style.height = boxes.image.h+"px";
      ov.style.borderRadius = ((s.imageRadius||0)*W)+"px";
      ov.style.setProperty("--ov", (s.overlayOpacity??55)/100);
      div.appendChild(ov);
    }
  }

  const pad = basePad(W);
  const ts = textSizes(W, s);
  const frameText = document.createElement("div");
  frameText.className = `frame-text pos-${s.position} align-${s.align}`;
  const toX = s.textOffsetX||0, toY = s.textOffsetY||0;
  const textBoxW = (s.textBoxWRatio||1) * boxes.text.w;
  const textBoxH = (s.textBoxHRatio||1) * boxes.text.h;
  frameText.style.left = (boxes.text.x+pad+toX)+"px"; frameText.style.top = (boxes.text.y+pad+toY)+"px";
  frameText.style.width = Math.max(10,textBoxW-2*pad)+"px"; frameText.style.height = Math.max(10,textBoxH-2*pad)+"px";
  frameText.style.gap = ts.gap+"px";

  if(editable){
    const handle = document.createElement("div");
    handle.className = "text-drag-handle";
    handle.innerHTML = "&#10021;";
    handle.addEventListener("pointerdown", onTextDragStart);
    frameText.appendChild(handle);
    textStageRef = { frameText, s, W, H };

    const resizeHandle = document.createElement("div");
    resizeHandle.className = "text-resize-handle";
    resizeHandle.title = "Drag to resize text box";
    frameText.appendChild(resizeHandle);
    attachTextResize(resizeHandle, frameText, div, s, boxes.text.w, boxes.text.h, pad);
  }

  if(s.kicker && s.kicker.trim()){
    const kick = document.createElement("div");
    kick.className = "slide-kicker";
    kick.style.color = s.kickerColor || s.textColor;
    kick.style.fontFamily = fp.bodyFont;
    kick.style.fontSize = (W*0.026)+"px";
    kick.textContent = s.kicker;
    frameText.appendChild(kick);
  }

  const h = document.createElement("div");
  h.className = "slide-heading"; h.style.color = s.textColor;
  h.style.fontFamily = fp.headFont; h.style.fontWeight = fp.headWeight; h.style.fontSize = ts.headPx+"px"; h.style.lineHeight = "1.08";
  h.contentEditable = editable ? "true" : "false"; h.spellcheck = false; h.innerText = s.heading;
  if(editable){
    h.addEventListener("input", ()=>{ s.heading = h.innerText; fitText(div, frameText, s); scheduleThumbCommit(idx); });
    h.addEventListener("blur", ()=>{ s.heading = h.innerText; commitThumb(idx); });
  }
  frameText.appendChild(h);

  if((s.body && s.body.trim()!=="") || editable){
    const p = document.createElement("div");
    p.className = "slide-body"; p.style.color = s.textColor;
    p.style.fontFamily = fp.bodyFont; p.style.fontWeight = fp.bodyWeight; p.style.fontSize = ts.bodyPx+"px"; p.style.lineHeight = "1.35";
    p.contentEditable = editable ? "true" : "false"; p.spellcheck = false; p.innerText = s.body;
    if(editable){
      p.addEventListener("input", ()=>{ s.body = p.innerText; fitText(div, frameText, s); scheduleThumbCommit(idx); });
      p.addEventListener("blur", ()=>{ s.body = p.innerText; commitThumb(idx); });
    }
    frameText.appendChild(p);
  }
  div.appendChild(frameText);

  if(state.showPageNum){
    const badgePx = W*0.026;
    const badge = document.createElement("div");
    badge.className = "slide-badge";
    badge.style.background = state.accent;
    badge.style.color = state.badgeTextColor;
    badge.style.right = (W*0.05)+"px";
    badge.style[state.badgePos==="top"?"top":"bottom"] = (W*0.05)+"px";
    badge.style.padding = (W*0.011)+"px "+(W*0.022)+"px";
    badge.style.fontFamily = fp.bodyFont; badge.style.fontSize = badgePx+"px"; badge.style.fontWeight = "700";
    badge.textContent = `${idx+1}/${state.slides.length}`;
    div.appendChild(badge);
  }

  const sigColor = s.signatureColor || s.textColor;
  const sigPx = W*0.022;
  const sigPad = W*0.05;
  const showTopSig = (s.sigTL && s.sigTL.trim()) || (s.sigTR && s.sigTR.trim());
  const showBottomSig = (s.sigBL && s.sigBL.trim()) || (s.sigBR && s.sigBR.trim());
  function makeSigRow(edgeProp, leftText, rightText, borderProp, padProp, edgeOffset){
    const row = document.createElement("div");
    row.className = "slide-signature-row";
    row.style.left = sigPad+"px"; row.style.right = sigPad+"px"; row.style[edgeProp] = (sigPad+(edgeOffset||0))+"px";
    row.style.color = sigColor; row.style.fontFamily = fp.bodyFont; row.style.fontSize = sigPx+"px";
    if(s.sigDivider!==false){
      row.style[borderProp] = `1px solid ${sigColor}`;
      row.style[padProp] = (sigPx*0.55)+"px";
    }
    const l = document.createElement("span"); l.className="slide-signature-side"; l.textContent = leftText||"";
    const r = document.createElement("span"); r.className="slide-signature-side"; r.style.marginLeft="auto"; r.textContent = rightText||"";
    row.appendChild(l); row.appendChild(r);
    return row;
  }

  let swipeHintH = 0;
  const showSwipeHint = state.showSwipeHint && (state.swipeHintText||"").trim()!=="" && !(state.swipeHintHideLast && idx===state.slides.length-1);
  if(showSwipeHint){
    const hint = document.createElement("div");
    hint.className = "slide-swipe-hint";
    hint.style.left = sigPad+"px"; hint.style.right = sigPad+"px"; hint.style.bottom = sigPad+"px";
    hint.style.color = state.swipeHintColor || s.textColor;
    hint.style.fontFamily = fp.bodyFont; hint.style.fontSize = (W*0.02)+"px";
    const label = document.createElement("span"); label.className="ssh-label"; label.textContent = state.swipeHintText;
    const line = document.createElement("span"); line.className="ssh-line";
    const arrow = document.createElement("span"); arrow.className="ssh-arrow"; arrow.innerHTML = "&#8594;";
    hint.appendChild(label); hint.appendChild(line); hint.appendChild(arrow);
    div.appendChild(hint);
    swipeHintH = (W*0.02)*1.9;
  }

  if(showTopSig) div.appendChild(makeSigRow("top", s.sigTL, s.sigTR, "borderBottom", "paddingBottom"));
  if(showBottomSig) div.appendChild(makeSigRow("bottom", s.sigBL, s.sigBR, "borderTop", "paddingTop", swipeHintH));

  if(s.logoImage && s.logoImageEl){
    const lw = (s.logoSize||0.16)*W, lh = lw*(s.logoImageEl.naturalHeight/s.logoImageEl.naturalWidth);
    const lp = logoPosition(s.logoPos||"tl", W, H, lw, lh);
    const logo = document.createElement("img");
    logo.className = "slide-logo"; logo.draggable = false;
    logo.src = s.logoImage;
    logo.style.left = lp.x+"px"; logo.style.top = lp.y+"px";
    logo.style.width = lw+"px"; logo.style.height = lh+"px";
    div.appendChild(logo);
  }

  if(editable){
    requestAnimationFrame(()=>fitText(div, frameText, s));
  }
  return div;
}

function fitText(slideDiv, frameText, s){
  s.tscale = s.fontScale || 1;
  let tries = 0;
  while(frameText.scrollHeight > frameText.clientHeight + 1 && s.tscale > 0.35 && tries < 60){
    s.tscale -= 0.02;
    const heading = frameText.querySelector(".slide-heading");
    const body = frameText.querySelector(".slide-body");
    const W = parseFloat(slideDiv.style.width);
    const ts = textSizes(W, s);
    if(heading) heading.style.fontSize = ts.headPx+"px";
    if(body) body.style.fontSize = ts.bodyPx+"px";
    frameText.style.gap = ts.gap+"px";
    tries++;
  }
}

/* ---------- image drag / zoom (live, no full re-render) ----------
   Each image layer (base photo = "", texture = "layer2") gets its own refs object
   so both can be dragged/zoomed independently without clobbering each other. */
let dragState = null;
function makeImgRefs(s, layerKey, boxW, boxH, natW, natH){
  const scaleKey = layerKey ? `${layerKey}Scale` : "imageScale";
  const offXKey = layerKey ? `${layerKey}OffsetX` : "imageOffsetX";
  const offYKey = layerKey ? `${layerKey}OffsetY` : "imageOffsetY";
  return {
    s, boxW, boxH, natW, natH,
    getScale: ()=> s[scaleKey]||1,
    getOffX: ()=> s[offXKey] ?? 0.5,
    getOffY: ()=> s[offYKey] ?? 0.5,
    setOffX: v=>{ s[offXKey]=v; },
    setOffY: v=>{ s[offYKey]=v; },
  };
}
function refreshImageLiveFor(imgEl, r){
  if(!imgEl || !r) return;
  const cb = computeImageBox(r.natW, r.natH, r.boxW, r.boxH, r.getScale(), r.getOffX(), r.getOffY());
  imgEl.style.left = cb.left+"px"; imgEl.style.top = cb.top+"px";
  imgEl.style.width = cb.dw+"px"; imgEl.style.height = cb.dh+"px";
}
function onImageDragStart(e){
  e.preventDefault();
  const imgEl = e.currentTarget;
  const r = imgEl._imgRefs;
  if(!r) return;
  const cb = computeImageBox(r.natW, r.natH, r.boxW, r.boxH, r.getScale(), r.getOffX(), r.getOffY());
  dragState = { imgEl, r, startX:e.clientX, startY:e.clientY, startOffX:r.getOffX(), startOffY:r.getOffY(), excessX:cb.excessX, excessY:cb.excessY };
  imgEl.classList.add("dragging");
  try{ imgEl.setPointerCapture(e.pointerId); }catch(err){}
  document.addEventListener("pointermove", onImageDragMove);
  document.addEventListener("pointerup", onImageDragEnd);
  document.addEventListener("pointercancel", onImageDragEnd);
}
function onImageDragMove(e){
  if(!dragState) return;
  e.preventDefault();
  const { r, imgEl } = dragState;
  const dx = e.clientX - dragState.startX, dy = e.clientY - dragState.startY;
  r.setOffX(dragState.excessX>0 ? clamp(dragState.startOffX - dx/r.boxW, 0, 1) : 0.5);
  r.setOffY(dragState.excessY>0 ? clamp(dragState.startOffY - dy/r.boxH, 0, 1) : 0.5);
  refreshImageLiveFor(imgEl, r);
}
function onImageDragEnd(){
  if(!dragState) return;
  document.removeEventListener("pointermove", onImageDragMove);
  document.removeEventListener("pointerup", onImageDragEnd);
  document.removeEventListener("pointercancel", onImageDragEnd);
  dragState.imgEl.classList.remove("dragging");
  dragState = null;
  commitThumb(state.active);
}

let textDragState = null;
function onTextDragStart(e){
  e.preventDefault(); e.stopPropagation();
  const r = textStageRef;
  textDragState = { startX:e.clientX, startY:e.clientY, baseOffX:r.s.textOffsetX||0, baseOffY:r.s.textOffsetY||0, dx:0, dy:0 };
  e.target.classList.add("dragging");
  try{ e.target.setPointerCapture(e.pointerId); }catch(err){}
  document.addEventListener("pointermove", onTextDragMove);
  document.addEventListener("pointerup", onTextDragEnd);
  document.addEventListener("pointercancel", onTextDragEnd);
}
function onTextDragMove(e){
  if(!textDragState) return;
  e.preventDefault();
  const dx = e.clientX - textDragState.startX, dy = e.clientY - textDragState.startY;
  textDragState.dx = dx; textDragState.dy = dy;
  if(textStageRef.frameText) textStageRef.frameText.style.transform = `translate(${dx}px, ${dy}px)`;
}
function onTextDragEnd(){
  if(!textDragState) return;
  document.removeEventListener("pointermove", onTextDragMove);
  document.removeEventListener("pointerup", onTextDragEnd);
  document.removeEventListener("pointercancel", onTextDragEnd);
  const r = textStageRef;
  if(r.s){
    r.s.textOffsetX = clamp(textDragState.baseOffX + textDragState.dx, -r.W*0.45, r.W*0.45);
    r.s.textOffsetY = clamp(textDragState.baseOffY + textDragState.dy, -r.H*0.45, r.H*0.45);
  }
  document.querySelectorAll(".text-drag-handle.dragging").forEach(h=>h.classList.remove("dragging"));
  textDragState = null;
  renderStage();
  commitThumb(state.active);
}

/* Resize the text box itself (distinct from repositioning it). Drag from the
   bottom-right handle to change how much width/height the text has to wrap into. */
function attachTextResize(handle, frameTextEl, slideDiv, s, availW, availH, pad){
  handle.addEventListener("pointerdown", e=>{
    e.preventDefault(); e.stopPropagation();
    const startX = e.clientX, startY = e.clientY;
    const startWRatio = s.textBoxWRatio || 1, startHRatio = s.textBoxHRatio || 1;
    handle.classList.add("dragging");
    try{ handle.setPointerCapture(e.pointerId); }catch(err){}
    const onMove = ev=>{
      ev.preventDefault();
      const dx = ev.clientX-startX, dy = ev.clientY-startY;
      s.textBoxWRatio = clamp(startWRatio + dx/availW, 0.3, 1.5);
      s.textBoxHRatio = clamp(startHRatio + dy/availH, 0.25, 1.8);
      const boxW = s.textBoxWRatio*availW, boxH = s.textBoxHRatio*availH;
      frameTextEl.style.width = Math.max(10, boxW-2*pad)+"px";
      frameTextEl.style.height = Math.max(10, boxH-2*pad)+"px";
      fitText(slideDiv, frameTextEl, s);
    };
    const onUp = ()=>{
      document.removeEventListener("pointermove", onMove);
      document.removeEventListener("pointerup", onUp);
      document.removeEventListener("pointercancel", onUp);
      handle.classList.remove("dragging");
      commitThumb(state.active);
    };
    document.addEventListener("pointermove", onMove);
    document.addEventListener("pointerup", onUp);
    document.addEventListener("pointercancel", onUp);
  });
}

/* ============================= STAGE / RAIL RENDER ============================= */
function renderStage(){
  const stage = document.getElementById("stage");
  stage.innerHTML = "";
  const asp = ASPECTS[state.aspect];
  const maxW = Math.min(stage.clientWidth-40, 460);
  const maxHRatio = (stage.clientHeight-40) / (asp.h/asp.w);
  const widthPx = Math.max(160, Math.min(maxW, maxHRatio));
  const slideDiv = buildSlideDOM(state.slides[state.active], state.active, true, widthPx);
  stage.appendChild(slideDiv);
}

function buildThumb(idx){
  const s = state.slides[idx];
  const wrap = document.createElement("div");
  wrap.className = "thumb-wrap" + (idx===state.active?" active":"");
  const frame = document.createElement("div");
  frame.className = "thumb-frame";
  const inner = document.createElement("div");
  inner.className = "thumb-inner";
  const asp = ASPECTS[state.aspect];
  const thumbW = 74, realW = 220;
  const scale = thumbW/realW;
  inner.style.transform = `scale(${scale})`;
  const mini = buildSlideDOM(s, idx, false, realW);
  inner.appendChild(mini);
  frame.style.height = (thumbW*(asp.h/asp.w))+"px";
  frame.appendChild(inner);
  wrap.appendChild(frame);
  const num = document.createElement("div");
  num.className = "thumb-num"; num.textContent = idx+1;
  wrap.appendChild(num);
  const actions = document.createElement("div");
  actions.className = "thumb-actions";
  actions.innerHTML = `<button title="Duplicate">\u2295</button><button title="Delete">\u2715</button>`;
  actions.children[0].onclick = (e)=>{ e.stopPropagation(); const clone=cloneSlide(state.slides[idx]); state.slides.splice(idx+1,0,clone); state.active=idx+1; renderAll(); };
  actions.children[1].onclick = (e)=>{ e.stopPropagation(); if(state.slides.length>1){ state.slides.splice(idx,1); state.active=Math.max(0,Math.min(state.active,state.slides.length-1)); renderAll(); } };
  wrap.appendChild(actions);
  wrap.onclick = ()=>setActiveSlide(idx);
  attachThumbDrag(wrap, idx);
  return wrap;
}

function reorderSlide(fromIdx, toIdxRaw){
  const slides = state.slides;
  const item = slides[fromIdx];
  let toIdx = toIdxRaw;
  slides.splice(fromIdx, 1);
  if(toIdx > fromIdx) toIdx -= 1;
  if(toIdx > slides.length) toIdx = slides.length;
  slides.splice(toIdx, 0, item);
  state.active = toIdx;
}
function attachThumbDrag(wrap, idx){
  wrap.addEventListener("pointerdown", e=>{
    if(e.target.closest(".thumb-actions")) return;
    if(state.slides.length<2) return;
    const startX = e.clientX, startY = e.clientY;
    const originIdx = idx;
    let dragging = false;
    let hoverTarget = null;
    const onMove = ev=>{
      const dx = ev.clientX-startX, dy = ev.clientY-startY;
      if(!dragging && Math.hypot(dx,dy)>6){
        dragging = true;
        wrap.classList.add("thumb-dragging");
        try{ wrap.setPointerCapture(e.pointerId); }catch(err){}
      }
      if(!dragging) return;
      ev.preventDefault();
      wrap.style.transform = `translate(${dx}px, ${dy*0.25}px)`;
      const rail = document.getElementById("rail");
      const wraps = Array.from(rail.querySelectorAll(".thumb-wrap"));
      wraps.forEach(w=>w.classList.remove("thumb-drop-target"));
      let target = wraps.length;
      for(let i=0;i<wraps.length;i++){
        if(i===originIdx) continue;
        const rect = wraps[i].getBoundingClientRect();
        if(ev.clientX < rect.left+rect.width/2){ target = i; wraps[i].classList.add("thumb-drop-target"); break; }
      }
      hoverTarget = target;
    };
    const onUp = ()=>{
      document.removeEventListener("pointermove", onMove);
      document.removeEventListener("pointerup", onUp);
      document.removeEventListener("pointercancel", onUp);
      wrap.classList.remove("thumb-dragging");
      wrap.style.transform = "";
      document.querySelectorAll(".thumb-drop-target").forEach(w=>w.classList.remove("thumb-drop-target"));
      if(dragging && hoverTarget!==null && hoverTarget!==originIdx && hoverTarget!==originIdx+1){
        reorderSlide(originIdx, hoverTarget);
        renderAll();
      }
      dragging = false;
    };
    document.addEventListener("pointermove", onMove);
    document.addEventListener("pointerup", onUp);
    document.addEventListener("pointercancel", onUp);
  });
}

function renderRail(){
  const rail = document.getElementById("rail");
  rail.innerHTML = ""; railThumbEls = [];
  state.slides.forEach((s,i)=>{ const w = buildThumb(i); railThumbEls.push(w); rail.appendChild(w); });
  const addBtn = document.createElement("button");
  addBtn.className = "add-slide-btn"; addBtn.textContent = "+";
  addBtn.onclick = ()=>{ if(state.slides.length<12){ const d=defaultSlides(); const t=d[state.slides.length % d.length]; state.slides.push({...t, imageEl:null}); state.active=state.slides.length-1; renderAll(); } };
  rail.appendChild(addBtn);
}

function commitThumb(idx){
  clearTimeout(thumbDebounceTimer);
  pushHistory();
  if(!railThumbEls[idx]) return;
  const fresh = buildThumb(idx);
  railThumbEls[idx].replaceWith(fresh);
  railThumbEls[idx] = fresh;
}
function scheduleThumbCommit(idx){
  clearTimeout(thumbDebounceTimer);
  thumbDebounceTimer = setTimeout(()=>commitThumb(idx), 350);
}
function updateRailActiveClasses(){
  railThumbEls.forEach((w,i)=>w.classList.toggle("active", i===state.active));
}
function setActiveSlide(idx){
  state.active = idx;
  renderSidebar();
  renderStage();
  updateRailActiveClasses();
}

function renderAll(){
  renderSidebar();
  renderStage();
  renderRail();
  pushHistory();
}
window.addEventListener("resize", ()=>{ renderStage(); });

/* ============================= EXPORT: CANVAS (PNG) ============================= */
async function ensureFontsReady(){
  const fp = {
    headFont: fontFamilyCSS(state.headFont), headWeight: state.headWeight, headName: state.headFont,
    bodyFont: fontFamilyCSS(state.bodyFont), bodyWeight: state.bodyWeight, bodyName: state.bodyFont,
  };
  try{
    await Promise.all([
      document.fonts.load(`${fp.headWeight} 80px "${fp.headName}"`),
      document.fonts.load(`${fp.bodyWeight} 40px "${fp.bodyName}"`),
    ]);
    await document.fonts.ready;
  }catch(e){}
}

function roundRectPath(ctx, x, y, w, h, r){
  r = Math.max(0, Math.min(r, w/2, h/2));
  ctx.beginPath();
  if(r<=0.01){ ctx.rect(x,y,w,h); return; }
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y, x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r);
  ctx.arcTo(x, y, x+w, y, r);
  ctx.closePath();
}
function drawImageInBox(ctx, img, box, scale, offX, offY, radius){
  ctx.save();
  roundRectPath(ctx, box.x, box.y, box.w, box.h, radius||0);
  ctx.clip();
  const cb = computeImageBox(img.naturalWidth, img.naturalHeight, box.w, box.h, scale||1, offX, offY);
  ctx.drawImage(img, box.x+cb.left, box.y+cb.top, cb.dw, cb.dh);
  ctx.restore();
}
function blendToCanvasOp(blend){
  if(!blend || blend==="normal") return "source-over";
  return blend;
}

function paintOverlayCanvas(ctx, box, dir, opacity, radius){
  if(!dir || dir==="none") return;
  const {x,y,w,h} = box;
  let grad;
  if(dir==="bottom"){ grad = ctx.createLinearGradient(x,y+h*0.25,x,y+h); grad.addColorStop(0,"rgba(0,0,0,0)"); grad.addColorStop(1,`rgba(0,0,0,${opacity})`); }
  else if(dir==="top"){ grad = ctx.createLinearGradient(x,y+h,x,y+h*0.25); grad.addColorStop(0,"rgba(0,0,0,0)"); grad.addColorStop(1,`rgba(0,0,0,${opacity})`); }
  else if(dir==="left"){ grad = ctx.createLinearGradient(x+w,y,x+w*0.25,y); grad.addColorStop(0,"rgba(0,0,0,0)"); grad.addColorStop(1,`rgba(0,0,0,${opacity})`); }
  else if(dir==="right"){ grad = ctx.createLinearGradient(x,y,x+w*0.75,y); grad.addColorStop(0,"rgba(0,0,0,0)"); grad.addColorStop(1,`rgba(0,0,0,${opacity})`); }
  else if(dir==="radial"){ grad = ctx.createRadialGradient(x+w/2,y+h/2, Math.min(w,h)*0.05, x+w/2,y+h/2, Math.max(w,h)*0.62); grad.addColorStop(0,"rgba(0,0,0,0)"); grad.addColorStop(0.55,"rgba(0,0,0,0)"); grad.addColorStop(1,`rgba(0,0,0,${opacity})`); }
  else if(dir==="flat"){ ctx.save(); roundRectPath(ctx,x,y,w,h,radius||0); ctx.clip(); ctx.fillStyle = `rgba(0,0,0,${opacity})`; ctx.fillRect(x,y,w,h); ctx.restore(); return; }
  if(grad){ ctx.save(); roundRectPath(ctx,x,y,w,h,radius||0); ctx.clip(); ctx.fillStyle = grad; ctx.fillRect(x,y,w,h); ctx.restore(); }
}

async function renderSlideCanvas(s, idx){
  const asp = ASPECTS[state.aspect];
  const fp = {
    headFont: fontFamilyCSS(state.headFont), headWeight: state.headWeight, headName: state.headFont,
    bodyFont: fontFamilyCSS(state.bodyFont), bodyWeight: state.bodyWeight, bodyName: state.bodyFont,
  };
  const W = asp.w, H = asp.h;
  const boxes = getBoxes(s.layout||"full", W, H);
  const canvas = document.createElement("canvas");
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext("2d");

  ctx.fillStyle = s.bgColor; ctx.fillRect(0,0,W,H);

  if(s.image){
    let img = s.imageEl;
    if(!img || !img.complete) img = await loadImageEl(s.image);
    const radiusPx = (s.imageRadius||0)*W;
    drawImageInBox(ctx, img, boxes.image, s.imageScale||1, s.imageOffsetX, s.imageOffsetY, radiusPx);

    if(s.layer2Image){
      let img2 = s.layer2ImageEl;
      if(!img2 || !img2.complete) img2 = await loadImageEl(s.layer2Image);
      ctx.save();
      ctx.globalAlpha = (s.layer2Opacity??60)/100;
      ctx.globalCompositeOperation = blendToCanvasOp(s.layer2Blend);
      drawImageInBox(ctx, img2, boxes.image, s.layer2Scale||1, s.layer2OffsetX, s.layer2OffsetY, radiusPx);
      ctx.restore();
    }

    if((s.layout||"full")==="full"){
      paintOverlayCanvas(ctx, boxes.image, s.overlayDirection, (s.overlayOpacity??55)/100, radiusPx);
    }
  }

  const pad = basePad(W);
  const textBoxW = (s.textBoxWRatio||1)*boxes.text.w, textBoxH = (s.textBoxHRatio||1)*boxes.text.h;
  const availW = textBoxW - 2*pad;
  const ts = textSizes(W, s);

  ctx.font = `${fp.headWeight} ${ts.headPx}px "${fp.headName}"`;
  const headLines = wrapLines(ctx, s.heading||"", availW);
  const hasBody = s.body && s.body.trim()!=="";
  ctx.font = `${fp.bodyWeight} ${ts.bodyPx}px "${fp.bodyName}"`;
  const bodyLines = hasBody ? wrapLines(ctx, s.body, availW) : [];

  const headBlockH = headLines.length*ts.headLH;
  const bodyBlockH = bodyLines.length*ts.bodyLH;
  const hasKicker = s.kicker && s.kicker.trim()!=="";
  const kickerPx = W*0.026, kickerLH = kickerPx*1.3, kickerGap = ts.gap*0.6;
  const totalH = (hasKicker? kickerLH+kickerGap : 0) + headBlockH + (hasBody? ts.gap+bodyBlockH : 0);

  let startY;
  const textTop = boxes.text.y + pad, textBottom = boxes.text.y + textBoxH - pad;
  if(s.position==="top") startY = textTop;
  else if(s.position==="bottom") startY = textBottom - totalH;
  else startY = textTop + ((textBottom-textTop)-totalH)/2;

  const toX = s.textOffsetX||0, toY = s.textOffsetY||0;
  startY += toY;
  const x = (s.align==="center" ? boxes.text.x + boxes.text.w/2 : boxes.text.x + pad) + toX;
  ctx.textAlign = s.align==="center" ? "center" : "left";
  ctx.textBaseline = "top";

  let cursorY = startY;
  if(hasKicker){
    ctx.font = `700 ${kickerPx}px "${fp.bodyName}"`;
    ctx.fillStyle = s.kickerColor || s.textColor;
    ctx.globalAlpha = 0.7;
    ctx.fillText(s.kicker.toUpperCase(), x, cursorY);
    ctx.globalAlpha = 1;
    cursorY += kickerLH + kickerGap;
  }
  ctx.fillStyle = s.textColor;
  ctx.font = `${fp.headWeight} ${ts.headPx}px "${fp.headName}"`;
  headLines.forEach((line,i)=>{ ctx.fillText(line, x, cursorY + i*ts.headLH); });

  if(hasBody){
    ctx.font = `${fp.bodyWeight} ${ts.bodyPx}px "${fp.bodyName}"`;
    const bodyStartY = cursorY + headBlockH + ts.gap;
    bodyLines.forEach((line,i)=>{ ctx.fillText(line, x, bodyStartY + i*ts.bodyLH); });
  }

  if(state.showPageNum){
    const label = `${idx+1}/${state.slides.length}`;
    const badgePx = W*0.026;
    ctx.font = `700 ${badgePx}px "${fp.bodyName}"`;
    const textW = ctx.measureText(label).width;
    const padX = W*0.022, padY = W*0.011;
    const bw = textW + padX*2, bh = badgePx + padY*2;
    const bx = W - W*0.05 - bw;
    const by = state.badgePos==="top" ? W*0.05 : H - W*0.05 - bh;
    ctx.fillStyle = state.accent;
    roundRect(ctx, bx, by, bw, bh, bh/2); ctx.fill();
    ctx.fillStyle = state.badgeTextColor;
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(label, bx+bw/2, by+bh/2+1);
  }

  function drawSwipeHint(){
    if(!state.showSwipeHint) return 0;
    if(state.swipeHintHideLast && idx===state.slides.length-1) return 0;
    const hintPx = W*0.02, hpad = W*0.05;
    const color = state.swipeHintColor || s.textColor;
    const label = (state.swipeHintText||"").toUpperCase();
    if(!label) return 0;
    ctx.font = `700 ${hintPx}px "${fp.bodyName}"`;
    ctx.fillStyle = color; ctx.globalAlpha = 0.7;
    ctx.textAlign = "left"; ctx.textBaseline = "alphabetic";
    const y = H - hpad;
    ctx.fillText(label, hpad, y);
    const textW = ctx.measureText(label).width;
    const lineY = y - hintPx*0.35;
    const lineStartX = hpad + textW + hintPx*1.2;
    const lineEndX = W - hpad - hintPx*0.9;
    if(lineEndX > lineStartX){
      ctx.strokeStyle = color; ctx.lineWidth = Math.max(1, W*0.0015);
      ctx.beginPath(); ctx.moveTo(lineStartX, lineY); ctx.lineTo(lineEndX, lineY); ctx.stroke();
      const ah = hintPx*0.35;
      ctx.beginPath();
      ctx.moveTo(lineEndX, lineY-ah); ctx.lineTo(lineEndX+ah*1.3, lineY); ctx.lineTo(lineEndX, lineY+ah); ctx.stroke();
    }
    ctx.globalAlpha = 1;
    return hintPx*1.9;
  }
  const swipeHintH = drawSwipeHint();

  function drawSigRow(isTop, leftText, rightText, bottomOffset){
    const sigPx = W*0.022, pad = W*0.05;
    ctx.font = `600 ${sigPx}px "${fp.bodyName}"`;
    ctx.fillStyle = s.signatureColor || s.textColor;
    ctx.globalAlpha = 0.75;
    ctx.textBaseline = "alphabetic";
    const y = isTop ? pad + sigPx*0.8 : H - pad - (bottomOffset||0);
    if(leftText){ ctx.textAlign = "left"; ctx.fillText(leftText.toUpperCase(), pad, y); }
    if(rightText){ ctx.textAlign = "right"; ctx.fillText(rightText.toUpperCase(), W-pad, y); }
    if(s.sigDivider!==false){
      const lineY = isTop ? pad + sigPx*1.55 : H - pad - sigPx*1.55 - (bottomOffset||0);
      ctx.globalAlpha = 0.75;
      ctx.strokeStyle = s.signatureColor || s.textColor;
      ctx.lineWidth = Math.max(1, W*0.0015);
      ctx.beginPath(); ctx.moveTo(pad, lineY); ctx.lineTo(W-pad, lineY); ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }
  const showTopSig = (s.sigTL && s.sigTL.trim()) || (s.sigTR && s.sigTR.trim());
  const showBottomSig = (s.sigBL && s.sigBL.trim()) || (s.sigBR && s.sigBR.trim());
  if(showTopSig) drawSigRow(true, s.sigTL, s.sigTR);
  if(showBottomSig) drawSigRow(false, s.sigBL, s.sigBR, swipeHintH);

  if(s.logoImage){
    let logoImg = s.logoImageEl;
    if(!logoImg || !logoImg.complete) logoImg = await loadImageEl(s.logoImage);
    const lw = (s.logoSize||0.16)*W, lh = lw*(logoImg.naturalHeight/logoImg.naturalWidth);
    const lp = logoPosition(s.logoPos||"tl", W, H, lw, lh);
    ctx.drawImage(logoImg, lp.x, lp.y, lw, lh);
  }

  return canvas;
}
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath(); ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}

async function exportCurrentPNG(){
  await ensureFontsReady();
  const canvas = await renderSlideCanvas(state.slides[state.active], state.active);
  canvas.toBlob(blob=>saveBlob(blob, `slide-${state.active+1}.png`), "image/png");
}
async function exportAllPNG(){
  await ensureFontsReady();
  const zip = new JSZip();
  for(let i=0;i<state.slides.length;i++){
    const canvas = await renderSlideCanvas(state.slides[i], i);
    const blob = await new Promise(res=>canvas.toBlob(res,"image/png"));
    zip.file(`slide-${i+1}.png`, blob);
  }
  const content = await zip.generateAsync({type:"blob"});
  saveBlob(content, "carousel-png.zip");
}
async function exportAllPNGSeparate(){
  await ensureFontsReady();
  showToast(`Preparing ${state.slides.length} files\u2026`);
  for(let i=0;i<state.slides.length;i++){
    const canvas = await renderSlideCanvas(state.slides[i], i);
    const blob = await new Promise(res=>canvas.toBlob(res,"image/png"));
    saveBlob(blob, `slide-${i+1}.png`);
    if(i < state.slides.length-1) await new Promise(res=>setTimeout(res, 450));
  }
}

/* ============================= EXPORT: SVG ============================= */
function overlaySVG(defs, body, box, dir, opacity, gid, clipId){
  if(!dir || dir==="none") return {defs, body};
  const {x,y,w,h} = box;
  const wrap = inner => clipId ? `<g clip-path="url(#${clipId})">${inner}</g>` : inner;
  if(dir==="flat"){ body += wrap(`<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="black" fill-opacity="${opacity.toFixed(3)}"/>`); return {defs, body}; }
  if(dir==="radial"){
    defs += `<radialGradient id="${gid}" cx="50%" cy="50%" r="62%"><stop offset="0" stop-color="black" stop-opacity="0"/><stop offset="55%" stop-color="black" stop-opacity="0"/><stop offset="100%" stop-color="black" stop-opacity="${opacity}"/></radialGradient>`;
    body += wrap(`<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="url(#${gid})"/>`);
    return {defs, body};
  }
  const coords = { bottom:["0","0","0","1"], top:["0","1","0","0"], left:["1","0","0","0"], right:["0","0","1","0"] }[dir];
  defs += `<linearGradient id="${gid}" x1="${coords[0]}" y1="${coords[1]}" x2="${coords[2]}" y2="${coords[3]}"><stop offset="25%" stop-color="black" stop-opacity="0"/><stop offset="100%" stop-color="black" stop-opacity="${opacity}"/></linearGradient>`;
  body += wrap(`<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="url(#${gid})"/>`);
  return {defs, body};
}

function buildSlideSVG(s, idx){
  const asp = ASPECTS[state.aspect];
  const fp = {
    headFont: fontFamilyCSS(state.headFont), headWeight: state.headWeight, headName: state.headFont,
    bodyFont: fontFamilyCSS(state.bodyFont), bodyWeight: state.bodyWeight, bodyName: state.bodyFont,
  };
  const W = asp.w, H = asp.h;
  const boxes = getBoxes(s.layout||"full", W, H);
  let defs = "", body = "";

  body += `<rect width="${W}" height="${H}" fill="${s.bgColor}"/>`;

  if(s.image){
    const natW = s.imageEl ? s.imageEl.naturalWidth : W, natH = s.imageEl ? s.imageEl.naturalHeight : H;
    const cb = computeImageBox(natW, natH, boxes.image.w, boxes.image.h, s.imageScale||1, s.imageOffsetX, s.imageOffsetY);
    const clipId = `clip${idx}`;
    const rxPx = (s.imageRadius||0)*W;
    defs += `<clipPath id="${clipId}"><rect x="${boxes.image.x}" y="${boxes.image.y}" width="${boxes.image.w}" height="${boxes.image.h}" rx="${rxPx.toFixed(1)}" ry="${rxPx.toFixed(1)}"/></clipPath>`;
    body += `<g clip-path="url(#${clipId})"><image href="${s.image}" x="${(boxes.image.x+cb.left).toFixed(1)}" y="${(boxes.image.y+cb.top).toFixed(1)}" width="${cb.dw.toFixed(1)}" height="${cb.dh.toFixed(1)}"/></g>`;

    if(s.layer2Image){
      const nat2W = s.layer2ImageEl ? s.layer2ImageEl.naturalWidth : W, nat2H = s.layer2ImageEl ? s.layer2ImageEl.naturalHeight : H;
      const cb2 = computeImageBox(nat2W, nat2H, boxes.image.w, boxes.image.h, s.layer2Scale||1, s.layer2OffsetX, s.layer2OffsetY);
      const blendAttr = (s.layer2Blend && s.layer2Blend!=="normal") ? ` style="mix-blend-mode:${s.layer2Blend}"` : "";
      body += `<g clip-path="url(#${clipId})"${blendAttr} opacity="${((s.layer2Opacity??60)/100).toFixed(3)}"><image href="${s.layer2Image}" x="${(boxes.image.x+cb2.left).toFixed(1)}" y="${(boxes.image.y+cb2.top).toFixed(1)}" width="${cb2.dw.toFixed(1)}" height="${cb2.dh.toFixed(1)}"/></g>`;
    }

    if((s.layout||"full")==="full"){
      const res = overlaySVG(defs, body, boxes.image, s.overlayDirection, (s.overlayOpacity??55)/100, `grad${idx}`, clipId);
      defs = res.defs; body = res.body;
    }
  }

  const pad = basePad(W);
  const textBoxW = (s.textBoxWRatio||1)*boxes.text.w, textBoxH = (s.textBoxHRatio||1)*boxes.text.h;
  const availW = textBoxW - 2*pad;
  const ts = textSizes(W, s);

  const measCanvas = document.createElement("canvas");
  const mctx = measCanvas.getContext("2d");
  mctx.font = `${fp.headWeight} ${ts.headPx}px "${fp.headName}"`;
  const headLines = wrapLines(mctx, s.heading||"", availW);
  const hasBody = s.body && s.body.trim()!=="";
  mctx.font = `${fp.bodyWeight} ${ts.bodyPx}px "${fp.bodyName}"`;
  const bodyLines = hasBody ? wrapLines(mctx, s.body, availW) : [];

  const headBlockH = headLines.length*ts.headLH;
  const bodyBlockH = bodyLines.length*ts.bodyLH;
  const hasKicker = s.kicker && s.kicker.trim()!=="";
  const kickerPx = W*0.026, kickerLH = kickerPx*1.3, kickerGap = ts.gap*0.6;
  const totalH = (hasKicker? kickerLH+kickerGap : 0) + headBlockH + (hasBody? ts.gap+bodyBlockH : 0);

  const textTop = boxes.text.y + pad, textBottom = boxes.text.y + textBoxH - pad;
  let startY;
  if(s.position==="top") startY = textTop;
  else if(s.position==="bottom") startY = textBottom - totalH;
  else startY = textTop + ((textBottom-textTop)-totalH)/2;

  const toX = s.textOffsetX||0, toY = s.textOffsetY||0;
  startY += toY;
  const x = (s.align==="center" ? boxes.text.x + boxes.text.w/2 : boxes.text.x + pad) + toX;
  const anchor = s.align==="center" ? "middle" : "start";

  let cursorY = startY;
  if(hasKicker){
    body += `<text x="${x}" y="${(cursorY+kickerPx*0.86).toFixed(1)}" font-family="${fp.bodyName}" font-weight="700" font-size="${kickerPx.toFixed(1)}" fill="${s.kickerColor||s.textColor}" fill-opacity="0.7" letter-spacing="1.5" text-anchor="${anchor}">${escapeXML(s.kicker.toUpperCase())}</text>`;
    cursorY += kickerLH + kickerGap;
  }

  body += `<text x="${x}" y="${cursorY + ts.headPx*0.86}" font-family="${fp.headName}" font-weight="${fp.headWeight}" font-size="${ts.headPx.toFixed(1)}" fill="${s.textColor}" text-anchor="${anchor}">`;
  headLines.forEach((line,i)=>{ body += `<tspan x="${x}" ${i===0?"":`dy="${ts.headLH}"`}>${escapeXML(line||" ")}</tspan>`; });
  body += `</text>`;

  if(hasBody){
    const bodyStartY = cursorY + headBlockH + ts.gap;
    body += `<text x="${x}" y="${bodyStartY + ts.bodyPx*0.86}" font-family="${fp.bodyName}" font-weight="${fp.bodyWeight}" font-size="${ts.bodyPx.toFixed(1)}" fill="${s.textColor}" text-anchor="${anchor}">`;
    bodyLines.forEach((line,i)=>{ body += `<tspan x="${x}" ${i===0?"":`dy="${ts.bodyLH}"`}>${escapeXML(line||" ")}</tspan>`; });
    body += `</text>`;
  }

  if(state.showPageNum){
    const label = `${idx+1}/${state.slides.length}`;
    const badgePx = W*0.026;
    mctx.font = `700 ${badgePx.toFixed(1)}px "${fp.bodyName}"`;
    const textW = mctx.measureText(label).width;
    const padX = W*0.022, padY = W*0.011;
    const bw = textW + padX*2, bh = badgePx + padY*2;
    const bx = W - W*0.05 - bw;
    const by = state.badgePos==="top" ? W*0.05 : H - W*0.05 - bh;
    body += `<rect x="${bx.toFixed(1)}" y="${by.toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" rx="${(bh/2).toFixed(1)}" fill="${state.accent}"/>`;
    body += `<text x="${(bx+bw/2).toFixed(1)}" y="${(by+bh/2+badgePx*0.35).toFixed(1)}" font-family="${fp.bodyName}" font-weight="700" font-size="${badgePx.toFixed(1)}" fill="${state.badgeTextColor}" text-anchor="middle">${escapeXML(label)}</text>`;
  }

  function sigRowSVG(isTop, leftText, rightText, bottomOffset){
    const sigPx = W*0.022, pad = W*0.05;
    const color = s.signatureColor || s.textColor;
    const y = isTop ? pad + sigPx*0.8 : H - pad - (bottomOffset||0);
    let out = "";
    if(leftText && leftText.trim()) out += `<text x="${pad.toFixed(1)}" y="${y.toFixed(1)}" font-family="${fp.bodyName}" font-weight="600" font-size="${sigPx.toFixed(1)}" fill="${color}" fill-opacity="0.75" letter-spacing="1" text-anchor="start">${escapeXML(leftText.toUpperCase())}</text>`;
    if(rightText && rightText.trim()) out += `<text x="${(W-pad).toFixed(1)}" y="${y.toFixed(1)}" font-family="${fp.bodyName}" font-weight="600" font-size="${sigPx.toFixed(1)}" fill="${color}" fill-opacity="0.75" letter-spacing="1" text-anchor="end">${escapeXML(rightText.toUpperCase())}</text>`;
    if(s.sigDivider!==false){
      const lineY = isTop ? pad + sigPx*1.55 : H - pad - sigPx*1.55 - (bottomOffset||0);
      out += `<line x1="${pad.toFixed(1)}" y1="${lineY.toFixed(1)}" x2="${(W-pad).toFixed(1)}" y2="${lineY.toFixed(1)}" stroke="${color}" stroke-opacity="0.75" stroke-width="${Math.max(1,W*0.0015).toFixed(2)}"/>`;
    }
    return out;
  }

  function swipeHintSVG(){
    if(!state.showSwipeHint) return {out:"", h:0};
    if(state.swipeHintHideLast && idx===state.slides.length-1) return {out:"", h:0};
    const label = (state.swipeHintText||"").trim();
    if(!label) return {out:"", h:0};
    const hintPx = W*0.02, hpad = W*0.05;
    const color = state.swipeHintColor || s.textColor;
    mctx.font = `700 ${hintPx.toFixed(1)}px "${fp.bodyName}"`;
    const textW = mctx.measureText(label.toUpperCase()).width;
    const y = H - hpad;
    const lineY = y - hintPx*0.35;
    const lineStartX = hpad + textW + hintPx*1.2;
    const lineEndX = W - hpad - hintPx*0.9;
    let out = `<text x="${hpad.toFixed(1)}" y="${y.toFixed(1)}" font-family="${fp.bodyName}" font-weight="700" font-size="${hintPx.toFixed(1)}" fill="${color}" fill-opacity="0.7" letter-spacing="1.5" text-anchor="start">${escapeXML(label.toUpperCase())}</text>`;
    if(lineEndX > lineStartX){
      const ah = hintPx*0.35;
      out += `<line x1="${lineStartX.toFixed(1)}" y1="${lineY.toFixed(1)}" x2="${lineEndX.toFixed(1)}" y2="${lineY.toFixed(1)}" stroke="${color}" stroke-opacity="0.7" stroke-width="${Math.max(1,W*0.0015).toFixed(2)}"/>`;
      out += `<polyline points="${lineEndX.toFixed(1)},${(lineY-ah).toFixed(1)} ${(lineEndX+ah*1.3).toFixed(1)},${lineY.toFixed(1)} ${lineEndX.toFixed(1)},${(lineY+ah).toFixed(1)}" fill="none" stroke="${color}" stroke-opacity="0.7" stroke-width="${Math.max(1,W*0.0015).toFixed(2)}"/>`;
    }
    return {out, h: hintPx*1.9};
  }
  const swipeHint = swipeHintSVG();
  body += swipeHint.out;

  const showTopSigSVG = (s.sigTL && s.sigTL.trim()) || (s.sigTR && s.sigTR.trim());
  const showBottomSigSVG = (s.sigBL && s.sigBL.trim()) || (s.sigBR && s.sigBR.trim());
  if(showTopSigSVG) body += sigRowSVG(true, s.sigTL, s.sigTR);
  if(showBottomSigSVG) body += sigRowSVG(false, s.sigBL, s.sigBR, swipeHint.h);

  if(s.logoImage){
    const natLW = s.logoImageEl ? s.logoImageEl.naturalWidth : 1, natLH = s.logoImageEl ? s.logoImageEl.naturalHeight : 1;
    const lw = (s.logoSize||0.16)*W, lh = lw*(natLH/natLW);
    const lp = logoPosition(s.logoPos||"tl", W, H, lw, lh);
    body += `<image href="${s.logoImage}" x="${lp.x.toFixed(1)}" y="${lp.y.toFixed(1)}" width="${lw.toFixed(1)}" height="${lh.toFixed(1)}"/>`;
  }

  return `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}"><defs>${defs}</defs>${body}</svg>`;
}

function exportCurrentSVG(){
  const svg = buildSlideSVG(state.slides[state.active], state.active);
  saveBlob(new Blob([svg], {type:"image/svg+xml"}), `slide-${state.active+1}.svg`);
}
async function exportAllSVG(){
  const zip = new JSZip();
  state.slides.forEach((s,i)=>{ zip.file(`slide-${i+1}.svg`, buildSlideSVG(s,i)); });
  const content = await zip.generateAsync({type:"blob"});
  saveBlob(content, "carousel-svg.zip");
}

/* ============================= INIT ============================= */
function openSidebarMobile(){
  document.getElementById("sidebar").classList.add("open");
  document.getElementById("sidebarBackdrop").classList.add("open");
  document.getElementById("sidebarCloseBtn").classList.add("open");
}
function closeSidebarMobile(){
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("sidebarBackdrop").classList.remove("open");
  document.getElementById("sidebarCloseBtn").classList.remove("open");
}
document.getElementById("mobileMenuBtn").onclick = openSidebarMobile;
document.getElementById("sidebarBackdrop").onclick = closeSidebarMobile;
document.getElementById("sidebarCloseBtn").onclick = closeSidebarMobile;
window.addEventListener("orientationchange", ()=>setTimeout(renderStage, 200));

// Paste image from clipboard (Ctrl/Cmd+V) anywhere in the app -> goes to the active slide
document.addEventListener("paste", (e)=>{
  const items = e.clipboardData && e.clipboardData.items;
  if(!items) return;
  for(const item of items){
    if(item.type && item.type.startsWith("image/")){
      const file = item.getAsFile();
      if(file){ e.preventDefault(); applyImageFileToActiveSlide(file); }
      break;
    }
  }
});

// Drag an image file from your computer onto the canvas
const stageEl = document.getElementById("stage");
let dragDepth = 0;
stageEl.addEventListener("dragover", (e)=>{ e.preventDefault(); });
stageEl.addEventListener("dragenter", (e)=>{ e.preventDefault(); dragDepth++; stageEl.classList.add("drag-over"); });
stageEl.addEventListener("dragleave", ()=>{ dragDepth = Math.max(0, dragDepth-1); if(dragDepth===0) stageEl.classList.remove("drag-over"); });
stageEl.addEventListener("drop", (e)=>{
  e.preventDefault(); dragDepth = 0; stageEl.classList.remove("drag-over");
  const file = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
  if(file) applyImageFileToActiveSlide(file);
});

renderAll();
</script>
